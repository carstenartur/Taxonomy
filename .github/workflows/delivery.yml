name: Delivery

on:
  workflow_run:
    workflows: [ "CI / CD" ]
    types: [ completed ]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/taxonomy

jobs:
  publish-reports:
    name: Publish reports
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    concurrency:
      group: taxonomy-quality-report-publication
      cancel-in-progress: false
    steps:
      - name: Download verified report artifact
        uses: actions/download-artifact@v7
        with:
          name: quality-reports
          path: quality-reports
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: quality-reports
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'Publish verified quality reports ${{ github.event.workflow_run.head_sha }}'

  publish-image:
    name: Publish Docker Image
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (
        github.event.workflow_run.head_branch == github.event.repository.default_branch ||
        startsWith(github.event.workflow_run.head_branch, 'v')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.event.workflow_run.head_branch == github.event.repository.default_branch }}
            type=raw,value=latest,enable=${{ github.event.workflow_run.head_branch == github.event.repository.default_branch }}
            type=raw,value=${{ github.event.workflow_run.head_branch }},enable=${{ startsWith(github.event.workflow_run.head_branch, 'v') }}
            type=raw,value=sha-${{ github.event.workflow_run.head_sha }}
          annotations: |
            org.opencontainers.image.title=Taxonomy Architecture Analyzer
            org.opencontainers.image.description=Spring Boot web application for C3-taxonomy catalogue analysis
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Carsten Hammer
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.event.workflow_run.head_sha }}
            VERSION=${{ steps.meta.outputs.version }}

  deploy-render:
    name: Deploy to Render
    needs: publish-image
    if: >-
      github.event.workflow_run.head_branch == github.event.repository.default_branch &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        if: ${{ env.HOOK_URL != '' }}
        run: |
          curl -fsSL --retry 3 "$HOOK_URL"
          echo "Render deployment triggered."
