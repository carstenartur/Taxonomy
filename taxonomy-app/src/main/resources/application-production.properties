# ── Production Profile ─────────────────────────────────────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=production,postgres (or another DB profile)
#
# This profile provides hardened defaults suitable for government and
# enterprise deployments. All values can still be overridden via environment
# variables.
# ───────────────────────────────────────────────────────────────────────────────

# ── Security: audit logging ON by default ──────────────────────────────────────
taxonomy.security.audit-logging=${TAXONOMY_AUDIT_LOGGING:true}

# ── Security: enforce password change on first login ───────────────────────────
taxonomy.security.require-password-change=${TAXONOMY_REQUIRE_PASSWORD_CHANGE:true}

# ── Security: restrict Swagger UI to authenticated users only ──────────────────
taxonomy.security.swagger-public=${TAXONOMY_SWAGGER_PUBLIC:false}

# ── Security: disable SpringDoc entirely in production ─────────────────────────
springdoc.api-docs.enabled=${TAXONOMY_SPRINGDOC_ENABLED:false}
springdoc.swagger-ui.enabled=${TAXONOMY_SPRINGDOC_ENABLED:false}

# ── Database: use 'update' DDL to preserve data across restarts ────────────────
spring.jpa.hibernate.ddl-auto=${TAXONOMY_DDL_AUTO:update}

# ── Search: use filesystem-backed Lucene index for persistence ─────────────────
spring.jpa.properties.hibernate.search.backend.directory.type=${TAXONOMY_SEARCH_DIRECTORY_TYPE:local-filesystem}
spring.jpa.properties.hibernate.search.backend.directory.root=${TAXONOMY_SEARCH_DIRECTORY_ROOT:/app/data/lucene-index}

# ── Performance: enable Thymeleaf template caching ─────────────────────────────
spring.thymeleaf.cache=${TAXONOMY_THYMELEAF_CACHE:true}

# ── Actuator: restrict health detail to authorized users ───────────────────────
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
