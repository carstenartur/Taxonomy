name: Apply Review Documentation Fixes

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/apply-review-doc-fixes.yml'
      - 'docs/dev/DEPENDENCY_HYGIENE.md'
      - 'docs/en/DEVELOPER_GUIDE.md'
      - 'docs/de/DEVELOPER_GUIDE.md'

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'qa/complete-open-points'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: qa/complete-open-points
          fetch-depth: 1

      - name: Apply reviewed documentation corrections
        run: |
          python3 - <<'PY'
          from pathlib import Path

          hygiene = Path('docs/dev/DEPENDENCY_HYGIENE.md')
          text = hygiene.read_text(encoding='utf-8')
          old = '1. the Maven Enforcer `includes` list for the exact coordinate; and'
          new = '1. the Maven Enforcer `bannedDependencies/excludes` list for the exact coordinate; and'
          if text.count(old) != 1:
              raise SystemExit('Expected one outdated Maven Enforcer exception reference')
          hygiene.write_text(text.replace(old, new, 1), encoding='utf-8')

          repository = 'https://github.com/carstenartur/Taxonomy/blob/main/'
          for name in ('docs/en/DEVELOPER_GUIDE.md', 'docs/de/DEVELOPER_GUIDE.md'):
              path = Path(name)
              guide = path.read_text(encoding='utf-8')
              guide = guide.replace('](../dev/', f']({repository}docs/dev/')
              guide = guide.replace('](../internal/', f']({repository}docs/internal/')
              path.write_text(guide, encoding='utf-8')
          PY
          git diff --check
          python3 .github/scripts/check-doc-links.py

      - name: Commit corrected documentation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/dev/DEPENDENCY_HYGIENE.md docs/en/DEVELOPER_GUIDE.md docs/de/DEVELOPER_GUIDE.md
          git diff --staged --quiet && exit 0
          git commit -m 'docs: resolve final dependency and Help-link review findings'
          git push origin HEAD:qa/complete-open-points
