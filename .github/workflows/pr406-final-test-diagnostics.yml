name: PR 406 Final Test Diagnostics

on:
  push:
    branches: [ "qa/senior-architecture-ergonomics-hardening" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  BGE_MODEL_REVISION: 5c38ec7c405ec4b44b94cc5a9bb96e735b38267a

jobs:
  full-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Download pinned embedding model
        env:
          MODEL_REVISION: ${{ env.BGE_MODEL_REVISION }}
        run: bash .github/scripts/download-embedding-model.sh
      - name: Run full reactor tests
        id: tests
        shell: bash
        env:
          TAXONOMY_EMBEDDING_MODEL_DIR: ${{ github.workspace }}/models/bge-small-en-v1.5
          TAXONOMY_EMBEDDING_ALLOW_DOWNLOAD: 'false'
        run: |
          mkdir -p target
          set +e
          set -o pipefail
          mvn -B install -DexcludedGroups="real-llm" 2>&1 | tee target/pr406-final-maven-test.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v7
        with:
          name: pr406-final-maven-test-log
          path: target/pr406-final-maven-test.log
          retention-days: 7
      - name: Fail when tests failed
        if: ${{ steps.tests.outputs.exit_code != '0' }}
        run: exit 1
