# Keycloak Development Environment
#
# Starts Keycloak, PostgreSQL, and the Taxonomy Analyzer configured for OIDC.
# Usage:
#   docker compose -f docker-compose-keycloak.yml up -d
#
# Access:
#   - Taxonomy Analyzer: http://localhost:8080
#   - Keycloak Admin:    http://localhost:8180 (admin / admin)
#
# Note: This is a development setup. For production, see docs/KEYCLOAK_SETUP.md.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taxonomy
      POSTGRES_USER: taxonomy
      POSTGRES_PASSWORD: taxonomy
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U taxonomy -d taxonomy
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U keycloak -d keycloak
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_PORT: 8180
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8180"
    depends_on:
      keycloak-db:
        condition: service_healthy

  taxonomy:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      TAXONOMY_DATASOURCE_URL: "jdbc:postgresql://db:5432/taxonomy"
      SPRING_DATASOURCE_USERNAME: taxonomy
      SPRING_DATASOURCE_PASSWORD: taxonomy
      TAXONOMY_DDL_AUTO: create
      TAXONOMY_AUDIT_LOGGING: "true"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  postgres-data:
  keycloak-db-data:
