##
## Production Docker Compose — Caddy (automatic HTTPS) + Taxonomy App
##
## Usage:
##   cp .env.example .env        # edit with your domain and credentials
##   docker compose -f docker-compose.prod.yml up -d --build
##
## Ports exposed to the internet:
##   443  — HTTPS (Caddy, automatic Let's Encrypt certificate)
##    80  — HTTP → HTTPS redirect + ACME challenge only
##
## Port 8080 is INTERNAL ONLY (Docker network) — never published to the host.
## Application state is stored below /app/data and survives container recreation.
##

services:
  # ─── Taxonomy Application ───────────────────────────────────
  taxonomy:
    build: .
    # Or use the published image instead of building locally:
    # image: ghcr.io/carstenartur/taxonomy:latest
    environment:
      - SPRING_PROFILES_ACTIVE=production,hsqldb
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - LLAMA_API_KEY=${LLAMA_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-}
      # Production must never fall back to admin/admin.
      - TAXONOMY_ADMIN_PASSWORD=${TAXONOMY_ADMIN_PASSWORD:?Set TAXONOMY_ADMIN_PASSWORD in .env}
      - TAXONOMY_REQUIRE_PASSWORD_CHANGE=true
      - TAXONOMY_LOGIN_RATE_LIMIT=true
      - TAXONOMY_AUDIT_LOGGING=true
      - TAXONOMY_SWAGGER_PUBLIC=false
      # Persist the embedded database and Lucene index in the mounted volume.
      # Immediate log fsync prevents an acknowledged architecture change from
      # being lost when the application container is replaced directly after a commit.
      - TAXONOMY_DATASOURCE_URL=jdbc:hsqldb:file:/app/data/taxonomydb;hsqldb.default_table_type=cached;hsqldb.write_delay_millis=0;shutdown=true
      - TAXONOMY_DDL_AUTO=update
      - TAXONOMY_SEARCH_DIRECTORY_TYPE=local-filesystem
      - TAXONOMY_SEARCH_DIRECTORY_ROOT=/app/data/lucene-index
      - TAXONOMY_EMBEDDING_ENABLED=${TAXONOMY_EMBEDDING_ENABLED:-true}
      - TAXONOMY_EMBEDDING_ALLOW_DOWNLOAD=${TAXONOMY_EMBEDDING_ALLOW_DOWNLOAD:-false}
      - TAXONOMY_EMBEDDING_MODEL_DIR=${TAXONOMY_EMBEDDING_MODEL_DIR:-}
      - TAXONOMY_THYMELEAF_CACHE=true
    expose:
      - "8080"                    # internal only — Caddy connects here
    volumes:
      - taxonomy-data:/app/data
      - djl-cache:/root/.djl.ai
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ─── Caddy Reverse Proxy (automatic HTTPS) ──────────────────
  caddy:
    # Tag is retained for readability; digest is authoritative and immutable.
    image: caddy:2-alpine@sha256:b9e25ad35f1dc8b11a91d531628f5a3537ab9769c6e4218ea2795bba37ef7b11
    ports:
      - "80:80"                   # HTTP → HTTPS redirect + ACME challenge
      - "443:443"                 # HTTPS
      - "443:443/udp"             # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data          # TLS certificates
      - caddy-config:/config      # Caddy runtime config
    environment:
      - DOMAIN=${DOMAIN:?Set DOMAIN in .env (e.g. taxonomy.example.com)}
    depends_on:
      taxonomy:
        condition: service_healthy
    restart: unless-stopped

volumes:
  taxonomy-data:
  djl-cache:
  caddy-data:
  caddy-config:
