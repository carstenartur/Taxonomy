spring.application.name=nato-taxonomy
server.port=8080

# HSQLDB in-memory
spring.datasource.url=jdbc:hsqldb:mem:taxonomydb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.hsqldb.jdbc.JDBCDriver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# LLM provider: GEMINI, OPENAI, DEEPSEEK, QWEN, LLAMA, MISTRAL, LOCAL_ONNX
# If not set, the provider is auto-detected from available API keys.
# LOCAL_ONNX requires no API key – the model is downloaded on first use via DJL.
llm.provider=${LLM_PROVIDER:}

# API keys — set via environment variables or here
gemini.api.key=${GEMINI_API_KEY:}
openai.api.key=${OPENAI_API_KEY:}
deepseek.api.key=${DEEPSEEK_API_KEY:}
qwen.api.key=${DASHSCOPE_API_KEY:}
llama.api.key=${LLAMA_API_KEY:}
mistral.api.key=${MISTRAL_API_KEY:}

# ── Local Embedding (all-MiniLM-L6-v2 via DJL / ONNX Runtime) ────────────────
# JGIT_EMBEDDING_ENABLED: set to false to disable embedding and semantic search globally
embedding.enabled=${JGIT_EMBEDDING_ENABLED:true}
# JGIT_EMBEDDING_MODEL_DIR: path to a pre-downloaded model directory; empty = DJL auto-download
embedding.model.dir=${JGIT_EMBEDDING_MODEL_DIR:}
# JGIT_EMBEDDING_MODEL_NAME: DJL model URL or HuggingFace model name
embedding.model.name=${JGIT_EMBEDDING_MODEL_NAME:djl://ai.djl.huggingface.onnxruntime/all-MiniLM-L6-v2}

# Admin password — set via environment variable ADMIN_PASSWORD to enable admin-only protection
# If not set, all panels are visible (backward compatible)
admin.password=${ADMIN_PASSWORD:}

# Thymeleaf
spring.thymeleaf.cache=false

# ── Hibernate Search (Lucene backend, in-memory heap index) ──────────────────
spring.jpa.properties.hibernate.search.enabled=true
spring.jpa.properties.hibernate.search.backend.type=lucene
spring.jpa.properties.hibernate.search.backend.directory.type=local-heap
spring.jpa.properties.hibernate.search.backend.analysis.configurer=bean:hibernateSearchAnalysisConfigurer
