name: PR 406 Integration Diagnostics

on:
  push:
    branches: [ "qa/senior-architecture-ergonomics-hardening" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  BGE_MODEL_REVISION: 5c38ec7c405ec4b44b94cc5a9bb96e735b38267a

jobs:
  apply-persistence-restart-fix:
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/qa/senior-architecture-ergonomics-hardening'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Apply exact persisted catalogue restart corrections
        run: python3 .github/scripts/apply-pr406-persistence-restart-fix.py
      - name: Commit corrections
        run: |
          if git diff --quiet; then
            echo "Persistence restart corrections already applied."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add taxonomy-app/src/main/java/com/taxonomy/catalog/service/TaxonomyService.java \
                  taxonomy-app/src/main/resources/application.properties \
                  docs/en/CONFIGURATION_REFERENCE.md \
                  docs/de/CONFIGURATION_REFERENCE.md
          git commit -m 'fix: reuse persisted taxonomy catalogue on restart'
          git push

  full-lifecycle:
    needs: [apply-persistence-restart-fix]
    if: always() && (needs.apply-persistence-restart-fix.result == 'success' || needs.apply-persistence-restart-fix.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Download pinned model
        env:
          MODEL_REVISION: ${{ env.BGE_MODEL_REVISION }}
        run: bash .github/scripts/download-embedding-model.sh
      - name: Run complete Maven lifecycle and retain log
        id: lifecycle
        shell: bash
        env:
          TAXONOMY_EMBEDDING_MODEL_DIR: ${{ github.workspace }}/models/bge-small-en-v1.5
          TAXONOMY_EMBEDDING_ALLOW_DOWNLOAD: 'false'
        run: |
          mkdir -p target
          set +e
          set -o pipefail
          mvn -B install -DexcludedGroups="real-llm" 2>&1 | tee target/pr406-integration-diagnostics.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pr406-integration-diagnostics
          path: target/pr406-integration-diagnostics.log
          retention-days: 7
      - name: Fail when lifecycle failed
        if: ${{ steps.lifecycle.outputs.exit_code != '0' }}
        run: exit 1
