# ── PostgreSQL profile ─────────────────────────────────────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=postgres
# Requires PostgreSQL JDBC driver (already bundled as runtime dependency).

spring.datasource.url=${TAXONOMY_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taxonomy}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:taxonomy}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:taxonomy}
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# jgit-storage-hibernate owns git_packs and git_reflog through its released
# PostgreSQL Flyway migration stream. Hibernate still validates these mapped
# entities but does not mutate the two library-owned tables.
spring.flyway.enabled=true
spring.jpa.properties.hibernate.hbm2ddl.schema_filter_provider=com.taxonomy.dsl.storage.JgitStorageHibernateSchemaFilterProvider
# One-time, fail-closed adoption of Taxonomy's pre-library pack schema.
# Enable only after backup and the documented read-only preflight.
taxonomy.jgit-storage.legacy-adoption=${TAXONOMY_JGIT_STORAGE_LEGACY_ADOPTION:false}

# ── HikariCP connection pool tuning for PostgreSQL ────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.initialization-fail-timeout=60000
