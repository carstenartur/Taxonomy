name: Apply Air-Gap Web Assets

on:
  push:
    branches:
      - qa/senior-architecture-ergonomics-hardening
    paths:
      - '.github/scripts/apply-airgap-web-assets.py'
      - '.github/workflows/apply-airgap-web-assets.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.repository == 'carstenartur/Taxonomy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: qa/senior-architecture-ergonomics-hardening
          fetch-depth: 0

      - name: Apply deterministic source patch
        run: python3 .github/scripts/apply-airgap-web-assets.py

      - name: Commit patched sources
        run: |
          if git diff --quiet; then
            echo 'Air-Gap asset migration is already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add taxonomy-app/pom.xml \
                  taxonomy-app/src/main/resources/templates/index.html
          git commit -m 'feat: package browser assets for Air-Gap operation'
          git push origin HEAD:qa/senior-architecture-ergonomics-hardening
