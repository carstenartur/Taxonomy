# ── PostgreSQL profile ─────────────────────────────────────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=postgres
# Requires PostgreSQL JDBC driver (already bundled as runtime dependency).

spring.datasource.url=${TAXONOMY_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taxonomy}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:taxonomy}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:taxonomy}
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── HikariCP connection pool tuning for PostgreSQL ────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.initialization-fail-timeout=60000
