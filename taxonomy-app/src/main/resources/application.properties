spring.application.name=taxonomy-analyzer
server.port=${PORT:8080}
server.address=0.0.0.0

# ── Default profile: hsqldb (in-memory, zero-config local dev) ────────────────
# Activate a different profile for external databases:
#   SPRING_PROFILES_ACTIVE=mssql      → Microsoft SQL Server
#   SPRING_PROFILES_ACTIVE=postgres   → PostgreSQL
#   SPRING_PROFILES_ACTIVE=oracle     → Oracle Database
#   SPRING_PROFILES_ACTIVE=hsqldb     → HSQLDB (explicit, same as default)
# Database-specific settings (URL, driver, dialect, pool) live in
# application-hsqldb.properties, application-mssql.properties,
# application-postgres.properties, and application-oracle.properties.
spring.profiles.default=hsqldb

# Async taxonomy initialization: set TAXONOMY_INIT_ASYNC=true to load taxonomy
# in the background AFTER the server starts accepting connections (recommended for
# Render and similar PaaS platforms to avoid "No open ports detected" timeouts).
# Defaults to false for backward compatibility (synchronous, tests pass as-is).
taxonomy.init.async=${TAXONOMY_INIT_ASYNC:false}

# create = rebuild schema on each start (safe for in-memory default); override to
# update for file-based deployments so data is not wiped on restart.
spring.jpa.hibernate.ddl-auto=${TAXONOMY_DDL_AUTO:create}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Memory optimization: JDBC batching ────────────────────────────────────────
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# LLM provider: GEMINI, OPENAI, DEEPSEEK, QWEN, LLAMA, MISTRAL, LOCAL_ONNX
# If not set, the provider is auto-detected from available API keys.
# LOCAL_ONNX requires no API key – the model is downloaded on first use via DJL.
llm.provider=${LLM_PROVIDER:}

# API keys — set via environment variables or here
gemini.api.key=${GEMINI_API_KEY:}
openai.api.key=${OPENAI_API_KEY:}
deepseek.api.key=${DEEPSEEK_API_KEY:}
qwen.api.key=${DASHSCOPE_API_KEY:}
llama.api.key=${LLAMA_API_KEY:}
mistral.api.key=${MISTRAL_API_KEY:}

# ── Local Embedding (all-MiniLM-L6-v2 via DJL / ONNX Runtime) ────────────────
# TAXONOMY_EMBEDDING_ENABLED: set to false to disable embedding and semantic search globally
embedding.enabled=${TAXONOMY_EMBEDDING_ENABLED:true}
# TAXONOMY_EMBEDDING_MODEL_DIR: path to a pre-downloaded model directory; empty = DJL auto-download
embedding.model.dir=${TAXONOMY_EMBEDDING_MODEL_DIR:}
# TAXONOMY_EMBEDDING_MODEL_NAME: DJL model URL or HuggingFace model name
embedding.model.name=${TAXONOMY_EMBEDDING_MODEL_NAME:djl://ai.djl.huggingface/sentence-transformers/all-MiniLM-L6-v2}

# Admin auth token — set via environment variable ADMIN_PASSWORD to enable admin-only protection
# If not set, all panels are visible (backward compatible)
admin.token=${ADMIN_PASSWORD:}

# ── Startup optimization ──────────────────────────────────────────────────
# Lazy bean initialization: only create beans when first accessed.
# TaxonomyService is annotated @Lazy(false) to remain eagerly initialized,
# preserving the @PostConstruct and @EventListener(ApplicationReadyEvent) behaviour.
# All other beans benefit from deferred creation, which reduces startup time.
spring.main.lazy-initialization=${TAXONOMY_LAZY_INIT:true}

# Disable JMX to save startup time and memory
spring.jmx.enabled=false

# Disable auto-configurations that are not needed
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.admin.SpringApplicationAdminJmxAutoConfiguration,\
  org.springframework.boot.autoconfigure.jmx.JmxAutoConfiguration

# Thymeleaf — cache templates in production; set TAXONOMY_THYMELEAF_CACHE=false for local dev
spring.thymeleaf.cache=${TAXONOMY_THYMELEAF_CACHE:true}

# ── Hibernate Statistics ───────────────────────────────────────────────────
# Enables Hibernate ORM statistics (sessions, queries, entities, cache).
# Micrometer auto-publishes these as hibernate.* metrics in /actuator/prometheus.
spring.jpa.properties.hibernate.generate_statistics=true

# ── Hibernate Search (Lucene backend) ────────────────────────────────────────
# Defaults to in-memory heap (fast, no I/O) for local dev/test.
# Override TAXONOMY_SEARCH_DIRECTORY_TYPE=local-filesystem (and optionally
# TAXONOMY_SEARCH_DIRECTORY_ROOT) for production disk-backed deployments.
spring.jpa.properties.hibernate.search.enabled=true
spring.jpa.properties.hibernate.search.backend.type=lucene
spring.jpa.properties.hibernate.search.backend.lucene_version=9.12.3
spring.jpa.properties.hibernate.search.backend.directory.type=${TAXONOMY_SEARCH_DIRECTORY_TYPE:local-heap}
spring.jpa.properties.hibernate.search.backend.directory.root=${TAXONOMY_SEARCH_DIRECTORY_ROOT:/app/data/lucene-index}
spring.jpa.properties.hibernate.search.backend.analysis.configurer=bean:hibernateSearchAnalysisConfigurer

# Suppress HSEARCH000568 warning about directory.root being unused when directory.type=local-heap
spring.jpa.properties.hibernate.search.configuration_property_checking.strategy=ignore

# ── Spring Boot Actuator ───────────────────────────────────────────────────
# Expose health, metrics, info, and prometheus endpoints over HTTP.
# JMX is not available on Render Free Tier; these HTTP endpoints are the
# modern replacement for JConsole / VisualVM monitoring.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.endpoint.prometheus.enabled=true

# Health endpoint probes for Kubernetes-style readiness/liveness (also works with Render)
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Include useful info in /actuator/info
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
info.app.name=${spring.application.name}
info.app.version=1.0.0-SNAPSHOT
info.app.description=Taxonomy Architecture Analyzer

# ── SpringDoc / Swagger UI ─────────────────────────────────────────────────
# Enabled by default for development; set TAXONOMY_SPRINGDOC_ENABLED=false
# in production to disable the /v3/api-docs and /swagger-ui.html endpoints.
springdoc.api-docs.enabled=${TAXONOMY_SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.enabled=${TAXONOMY_SPRINGDOC_ENABLED:true}

# ── Rate Limiting ──────────────────────────────────────────────────────────
# Maximum LLM-backed API requests per IP per minute.
# Set to 0 to disable. Protects against Gemini/OpenAI quota exhaustion.
taxonomy.rate-limit.per-minute=${TAXONOMY_RATE_LIMIT_PER_MINUTE:10}

# ── Login Brute-Force Protection ──────────────────────────────────────────
# Rate-limits failed login attempts per IP. Enabled by default.
taxonomy.security.login-rate-limit.enabled=${TAXONOMY_LOGIN_RATE_LIMIT:true}
# Maximum failed login attempts before lockout.
taxonomy.security.login-rate-limit.max-attempts=${TAXONOMY_LOGIN_MAX_ATTEMPTS:5}
# Lockout duration in seconds after exceeding max attempts.
taxonomy.security.login-rate-limit.lockout-seconds=${TAXONOMY_LOGIN_LOCKOUT_SECONDS:300}

# ── Password Policy ───────────────────────────────────────────────────────
# When true, users with the default password are redirected to /change-password.
taxonomy.security.require-password-change=${TAXONOMY_REQUIRE_PASSWORD_CHANGE:false}

# ── Swagger Access Control ────────────────────────────────────────────────
# When true, Swagger UI is publicly accessible. Set to false in production.
taxonomy.security.swagger-public=${TAXONOMY_SWAGGER_PUBLIC:true}

# ── Security Audit Logging ────────────────────────────────────────────────
# When true, logs authentication events (login success/failure).
taxonomy.security.audit-logging=${TAXONOMY_AUDIT_LOGGING:false}

# ── LLM Settings ───────────────────────────────────────────────────────────
# Maximum outgoing requests per minute to the LLM provider.
# Gemini free tier: 5 RPM; paid tiers allow higher values.
taxonomy.llm.rpm=${TAXONOMY_LLM_RPM:5}
# HTTP timeout for LLM API calls in seconds. A timeout error is returned instead of hanging.
taxonomy.llm.timeout-seconds=${TAXONOMY_LLM_TIMEOUT_SECONDS:30}
# Minimum relevance score (0–100) for a node to appear in architecture views.
taxonomy.analysis.min-score=${TAXONOMY_ANALYSIS_MIN_SCORE:70}

# ── DSL / JGit Settings ────────────────────────────────────────────────────
# Default branch for new DSL commits.
taxonomy.dsl.default-branch=${TAXONOMY_DSL_DEFAULT_BRANCH:draft}
# Project name used in exports and commit metadata.
taxonomy.dsl.project-name=${TAXONOMY_DSL_PROJECT_NAME:Taxonomy Architecture}
# Auto-commit interval in seconds (0 = disabled).
taxonomy.dsl.auto-save-interval=${TAXONOMY_DSL_AUTO_SAVE_INTERVAL:0}
# Remote Git repository URL to replicate/push to (empty = disabled).
taxonomy.dsl.remote-url=${TAXONOMY_DSL_REMOTE_URL:}
# Authentication token for the remote Git repository (stored securely, displayed masked).
taxonomy.dsl.remote-token=${TAXONOMY_DSL_REMOTE_TOKEN:}
# Automatically push to remote after each DSL commit.
taxonomy.dsl.remote-push-on-commit=${TAXONOMY_DSL_REMOTE_PUSH_ON_COMMIT:false}

# ── Size Limits ─────────────────────────────────────────────────────────────
# Maximum length of business requirement text input.
taxonomy.limits.max-business-text=${TAXONOMY_LIMITS_MAX_BUSINESS_TEXT:5000}
# Maximum nodes in generated architecture views.
taxonomy.limits.max-architecture-nodes=${TAXONOMY_LIMITS_MAX_ARCHITECTURE_NODES:50}
# Maximum nodes in export outputs.
taxonomy.limits.max-export-nodes=${TAXONOMY_LIMITS_MAX_EXPORT_NODES:200}
