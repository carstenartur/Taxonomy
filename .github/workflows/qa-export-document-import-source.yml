name: QA Export Document Import Source

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/qa-export-document-import-source.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: document-import-source
          path: taxonomy-app/src/main/resources/static/js/shared/taxonomy-document-import.js
          retention-days: 1
