name: Apply Security Controller Boundary

on:
  push:
    branches:
      - qa/senior-architecture-ergonomics-hardening
    paths:
      - '.github/scripts/apply-security-controller-boundary.py'

permissions:
  contents: write

jobs:
  apply:
    if: github.repository == 'carstenartur/Taxonomy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: qa/senior-architecture-ergonomics-hardening
          fetch-depth: 0
      - run: python3 .github/scripts/apply-security-controller-boundary.py
      - name: Commit safely
        run: |
          if git diff --quiet; then
            echo 'Security controller boundary already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add taxonomy-app/src/test/java/com/taxonomy/ArchitectureTest.java \
                  docs/dev/08-archunit-exceptions.md
          git commit -m 'test: enforce repository-free controllers without exceptions'
          git pull --rebase origin qa/senior-architecture-ergonomics-hardening
          git push origin HEAD:qa/senior-architecture-ergonomics-hardening
