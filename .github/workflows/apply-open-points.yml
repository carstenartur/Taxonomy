name: Apply QA Open Points

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/scripts/apply-open-points.py'
      - '.github/workflows/apply-open-points.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'qa/complete-open-points'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: qa/complete-open-points
          fetch-depth: 0

      - name: Configure branch commit identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Correct exact German source wording
        run: |
          sed -i 's/kein Pool für In-Process-HSQLDB erforderlich/kein Pool für In-Process-HSQLDB nötig/' \
            .github/scripts/apply-open-points.py

      - name: Apply repository patches
        run: |
          set +e
          python3 .github/scripts/apply-open-points.py > /tmp/apply-open-points.log 2>&1
          status=$?
          cat /tmp/apply-open-points.log
          if [ "$status" -ne 0 ]; then
            printf 'run=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .github/apply-open-points-error.log
            cat /tmp/apply-open-points.log >> .github/apply-open-points-error.log
            git add .github/apply-open-points-error.log
            git commit -m 'chore: record QA migration diagnostic'
            git push origin HEAD:qa/complete-open-points
            exit "$status"
          fi

      - name: Validate generated sources
        run: |
          python3 -m py_compile .github/scripts/check-dependency-hygiene.py
          node --check .github/scripts/ui-acceptance.mjs
          node --check .github/scripts/accessibility-audit.mjs
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse('pom.xml')
          PY
          git diff --check

      - name: Commit code, docs, and staged workflow payloads
        run: |
          rm -f .github/apply-open-points-error.log
          mkdir -p .github/generated-workflows
          for workflow in \
            ci-cd.yml \
            ui-acceptance.yml \
            accessibility.yml \
            database-compatibility.yml \
            documentation-screenshots.yml; do
            cp ".github/workflows/${workflow}" ".github/generated-workflows/${workflow}"
          done
          git checkout HEAD -- .github/workflows
          git clean -f .github/workflows
          git add -A
          git commit -m 'qa: complete database, dependency, UX, accessibility, and CI hardening'
          git push origin HEAD:qa/complete-open-points
