spring.application.name=taxonomy-analyzer
server.port=${PORT:8080}
server.address=0.0.0.0

# Async taxonomy initialization: set TAXONOMY_INIT_ASYNC=true to load taxonomy
# in the background AFTER the server starts accepting connections (recommended for
# Render and similar PaaS platforms to avoid "No open ports detected" timeouts).
# Defaults to false for backward compatibility (synchronous, tests pass as-is).
taxonomy.init.async=${TAXONOMY_INIT_ASYNC:false}

# HSQLDB — defaults to in-memory for local dev/test; override TAXONOMY_DATASOURCE_URL
# for paid-tier Render or other disk-backed deployments, e.g.:
# jdbc:hsqldb:file:/app/data/taxonomydb;hsqldb.default_table_type=cached;shutdown=true
# Note: Render Free Tier does not support persistent disks; the mem: default is correct.
spring.datasource.url=${TAXONOMY_DATASOURCE_URL:jdbc:hsqldb:mem:taxonomydb;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=org.hsqldb.jdbc.JDBCDriver
# SimpleDriverDataSource bypasses HikariCP entirely — no pool needed for in-process HSQLDB.
# This eliminates connection-pool exhaustion and reduces memory overhead on constrained hosts.
spring.datasource.type=org.springframework.jdbc.datasource.SimpleDriverDataSource
spring.datasource.username=sa
spring.datasource.password=

# create = rebuild schema on each start (safe for in-memory default); override to
# update for file-based deployments so data is not wiped on restart.
spring.jpa.hibernate.ddl-auto=${TAXONOMY_DDL_AUTO:create}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Explicit dialect required because SimpleDriverDataSource does not expose JDBC metadata
# for automatic dialect detection by Hibernate 7.x
spring.jpa.database-platform=org.hibernate.dialect.HSQLDialect

# ── Memory optimization: JDBC batching ────────────────────────────────────────
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# LLM provider: GEMINI, OPENAI, DEEPSEEK, QWEN, LLAMA, MISTRAL, LOCAL_ONNX
# If not set, the provider is auto-detected from available API keys.
# LOCAL_ONNX requires no API key – the model is downloaded on first use via DJL.
llm.provider=${LLM_PROVIDER:}

# API keys — set via environment variables or here
gemini.api.key=${GEMINI_API_KEY:}
openai.api.key=${OPENAI_API_KEY:}
deepseek.api.key=${DEEPSEEK_API_KEY:}
qwen.api.key=${DASHSCOPE_API_KEY:}
llama.api.key=${LLAMA_API_KEY:}
mistral.api.key=${MISTRAL_API_KEY:}

# ── Local Embedding (all-MiniLM-L6-v2 via DJL / ONNX Runtime) ────────────────
# TAXONOMY_EMBEDDING_ENABLED: set to false to disable embedding and semantic search globally
embedding.enabled=${TAXONOMY_EMBEDDING_ENABLED:true}
# TAXONOMY_EMBEDDING_MODEL_DIR: path to a pre-downloaded model directory; empty = DJL auto-download
embedding.model.dir=${TAXONOMY_EMBEDDING_MODEL_DIR:}
# TAXONOMY_EMBEDDING_MODEL_NAME: DJL model URL or HuggingFace model name
embedding.model.name=${TAXONOMY_EMBEDDING_MODEL_NAME:djl://ai.djl.huggingface.onnxruntime/all-MiniLM-L6-v2}

# Admin password — set via environment variable ADMIN_PASSWORD to enable admin-only protection
# If not set, all panels are visible (backward compatible)
admin.password=${ADMIN_PASSWORD:}

# ── Startup optimization ──────────────────────────────────────────────────
# Lazy bean initialization: only create beans when first accessed.
# TaxonomyService is annotated @Lazy(false) to remain eagerly initialized,
# preserving the @PostConstruct and @EventListener(ApplicationReadyEvent) behaviour.
# All other beans benefit from deferred creation, which reduces startup time.
spring.main.lazy-initialization=${TAXONOMY_LAZY_INIT:true}

# Disable JMX to save startup time and memory
spring.jmx.enabled=false

# Disable auto-configurations that are not needed
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.admin.SpringApplicationAdminJmxAutoConfiguration,\
  org.springframework.boot.autoconfigure.jmx.JmxAutoConfiguration

# Thymeleaf — cache templates in production; set TAXONOMY_THYMELEAF_CACHE=false for local dev
spring.thymeleaf.cache=${TAXONOMY_THYMELEAF_CACHE:true}

# ── Hibernate Statistics ───────────────────────────────────────────────────
# Enables Hibernate ORM statistics (sessions, queries, entities, cache).
# Micrometer auto-publishes these as hibernate.* metrics in /actuator/prometheus.
spring.jpa.properties.hibernate.generate_statistics=true

# ── Hibernate Search (Lucene backend) ────────────────────────────────────────
# Defaults to in-memory heap (fast, no I/O) for local dev/test.
# Override TAXONOMY_SEARCH_DIRECTORY_TYPE=local-filesystem (and optionally
# TAXONOMY_SEARCH_DIRECTORY_ROOT) for production disk-backed deployments.
spring.jpa.properties.hibernate.search.enabled=true
spring.jpa.properties.hibernate.search.backend.type=lucene
spring.jpa.properties.hibernate.search.backend.lucene_version=9.12.3
spring.jpa.properties.hibernate.search.backend.directory.type=${TAXONOMY_SEARCH_DIRECTORY_TYPE:local-heap}
spring.jpa.properties.hibernate.search.backend.directory.root=${TAXONOMY_SEARCH_DIRECTORY_ROOT:/app/data/lucene-index}
spring.jpa.properties.hibernate.search.backend.analysis.configurer=bean:hibernateSearchAnalysisConfigurer

# Suppress HSEARCH000568 warning about directory.root being unused when directory.type=local-heap
spring.jpa.properties.hibernate.search.configuration_property_checking.strategy=ignore

# ── SpringDoc / Swagger UI ─────────────────────────────────────────────────
# Enabled by default for development; set TAXONOMY_SPRINGDOC_ENABLED=false
# in production to disable the /v3/api-docs and /swagger-ui.html endpoints.
springdoc.api-docs.enabled=${TAXONOMY_SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.enabled=${TAXONOMY_SPRINGDOC_ENABLED:true}

# ── Rate Limiting ──────────────────────────────────────────────────────────
# Maximum LLM-backed API requests per IP per minute.
# Set to 0 to disable. Protects against Gemini/OpenAI quota exhaustion.
taxonomy.rate-limit.per-minute=${TAXONOMY_RATE_LIMIT_PER_MINUTE:10}
