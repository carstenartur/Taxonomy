name: Test Diagnostics

on:
  push:
    branches: [ "qa/senior-architecture-ergonomics-hardening" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  BGE_MODEL_REVISION: 5c38ec7c405ec4b44b94cc5a9bb96e735b38267a

jobs:
  test-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Download and verify pinned embedding model
        env:
          MODEL_REVISION: ${{ env.BGE_MODEL_REVISION }}
        run: bash .github/scripts/download-embedding-model.sh

      - name: Run full reactor tests and preserve complete log
        id: tests
        shell: bash
        env:
          TAXONOMY_EMBEDDING_MODEL_DIR: ${{ github.workspace }}/models/bge-small-en-v1.5
          TAXONOMY_EMBEDDING_ALLOW_DOWNLOAD: 'false'
        run: |
          mkdir -p target
          set +e
          set -o pipefail
          mvn -B install -DexcludedGroups="real-llm" 2>&1 | tee target/maven-test.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload complete Maven test log
        uses: actions/upload-artifact@v7
        with:
          name: maven-test-log
          path: target/maven-test.log
          retention-days: 14

      - name: Fail when Maven tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1
