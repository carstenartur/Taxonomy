name: Apply Hypothesis Context Migration

on:
  push:
    branches:
      - qa/senior-architecture-ergonomics-hardening
    paths:
      - '.github/scripts/apply-hypothesis-context-migration.py'

permissions:
  contents: write

jobs:
  apply:
    if: github.repository == 'carstenartur/Taxonomy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: qa/senior-architecture-ergonomics-hardening
          fetch-depth: 0
      - name: Apply context-explicit hypothesis patch
        run: python3 .github/scripts/apply-hypothesis-context-migration.py
      - name: Commit safely
        run: |
          if git diff --quiet; then
            echo 'Hypothesis context migration already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add taxonomy-app/src/main/java/com/taxonomy/versioning/controller/DslApiController.java \
                  taxonomy-app/src/test/java/com/taxonomy/ArchitectureTest.java \
                  docs/dev/08-archunit-exceptions.md \
                  docs/dev/05-workspace-git-context.md
          git commit -m 'refactor: make hypothesis operations workspace-explicit'
          git pull --rebase origin qa/senior-architecture-ergonomics-hardening
          git push origin HEAD:qa/senior-architecture-ergonomics-hardening
