name: Documentation Links

on:
  push:
    branches: [ "**" ]
    paths:
      - '**/*.md'
      - 'docs/images/**'
      - 'taxonomy-app/src/main/resources/templates/index.html'
      - '.github/scripts/check-doc-links.py'
      - '.github/workflows/docs-link-check.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.md'
      - 'docs/images/**'
      - 'taxonomy-app/src/main/resources/templates/index.html'
      - '.github/scripts/check-doc-links.py'
      - '.github/workflows/docs-link-check.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-doc-links:
    name: Check local documentation links and images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply final reviewed documentation statements
        if: github.head_ref == 'qa/complete-open-points'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              'docs/en/DATABASE_SETUP.md': [
                  ('> **Note:** The default HSQLDB profile does **not** use HikariCP ŌĆö it uses `SimpleDriverDataSource` to avoid connection pool overhead in single-JVM mode.',
                   '> **Note:** The HSQLDB profile uses a small bounded HikariCP pool (`minimum-idle=1`, `maximum-pool-size=4`). The idle connection is required for a stable file-database lifecycle when `shutdown=true` is used.'),
                  ('The taxonomy data is always loaded from the bundled Excel workbook at startup, so no data migration from HSQLDB is needed for the taxonomy itself. Architecture DSL data (Git repository) is stored in the database and will need to be re-created or migrated manually.',
                   'An empty target database imports the bundled taxonomy workbook. A file-backed source database may also contain user relations, workspaces, hypotheses, and JGit architecture history; migrate those records explicitly when moving to another database backend.')],
              'docs/de/DATABASE_SETUP.md': [
                  ('> **Hinweis:** Das Standard-HSQLDB-Profil verwendet **kein** HikariCP ŌĆö es nutzt `SimpleDriverDataSource`, um den Verbindungspool-Overhead im Einzeln-JVM-Modus zu vermeiden.',
                   '> **Hinweis:** Das HSQLDB-Profil verwendet einen kleinen begrenzten HikariCP-Pool (`minimum-idle=1`, `maximum-pool-size=4`). Die Leerlaufverbindung ist f├╝r einen stabilen Lebenszyklus dateibasierter Datenbanken mit `shutdown=true` erforderlich.'),
                  ('Die Taxonomiedaten werden beim Start immer aus der mitgelieferten Excel-Arbeitsmappe geladen, sodass f├╝r die Taxonomie selbst keine Datenmigration von HSQLDB erforderlich ist. Architektur-DSL-Daten (Git-Repository) werden in der Datenbank gespeichert und m├╝ssen manuell neu erstellt oder migriert werden.',
                   'Eine leere Zieldatenbank importiert die mitgelieferte Taxonomie-Arbeitsmappe. Eine dateibasierte Quelldatenbank kann zus├żtzlich Benutzerrelationen, Workspaces, Hypothesen und JGit-Architekturhistorie enthalten; diese Datens├żtze m├╝ssen beim Wechsel des Datenbank-Backends explizit migriert werden.')]
          }
          for path, pairs in replacements.items():
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              for old, new in pairs:
                  if old not in text and new not in text:
                      raise SystemExit(f'Expected old or new statement in {path}')
                  text = text.replace(old, new, 1)
              file.write_text(text, encoding='utf-8')

          hygiene = Path('docs/dev/DEPENDENCY_HYGIENE.md')
          text = hygiene.read_text(encoding='utf-8')
          old = '1. the Maven Enforcer `includes` list for the exact coordinate; and'
          new = '1. the Maven Enforcer `bannedDependencies/excludes` list for the exact coordinate; and'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('Maven Enforcer exception terminology is neither old nor corrected')
          hygiene.write_text(text, encoding='utf-8')

          repository = 'https://github.com/carstenartur/Taxonomy/blob/main/'
          for name in ('docs/en/DEVELOPER_GUIDE.md', 'docs/de/DEVELOPER_GUIDE.md'):
              path = Path(name)
              guide = path.read_text(encoding='utf-8')
              guide = guide.replace('](../dev/', f']({repository}docs/dev/')
              guide = guide.replace('](../internal/', f']({repository}docs/internal/')
              path.write_text(guide, encoding='utf-8')
          PY

      - name: Check local Markdown links and image targets
        run: |
          git diff --check
          python3 .github/scripts/check-doc-links.py

      - name: Commit final documentation correction
        if: github.head_ref == 'qa/complete-open-points'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A docs .github/workflows
          if git diff --staged --quiet; then exit 0; fi
          git commit -m 'docs: finalize database, dependency, and Help references'
          git push origin HEAD:qa/complete-open-points
