name: Coverage Focused Tests

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Run focused coverage tests
        id: tests
        shell: bash
        run: |
          set +e
          set -o pipefail
          mvn -pl taxonomy-app -am \
            -Dtest=LlmServiceBranchCoverageTest,LlmProviderConfigBranchCoverageTest,WorkspaceControllerBranchCoverageTest \
            -Dsurefire.failIfNoSpecifiedTests=false \
            test --no-transfer-progress 2>&1 | tee focused-coverage-tests.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload focused test diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: focused-coverage-test-log
          path: focused-coverage-tests.log
          retention-days: 3
      - name: Enforce focused test result
        if: steps.tests.outputs.status != '0'
        run: exit 1
