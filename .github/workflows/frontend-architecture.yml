name: Frontend Architecture

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'taxonomy-app/src/main/resources/static/js/**'
      - 'taxonomy-app/src/main/resources/templates/index.html'
      - 'docs/en/ARCHITECTURE.md'
      - 'docs/de/ARCHITECTURE.md'
      - 'docs/en/DEVELOPER_GUIDE.md'
      - 'docs/de/DEVELOPER_GUIDE.md'
      - '.github/scripts/check-frontend-api-boundaries.py'
      - '.github/scripts/apply-final-doc-alignment.py'
      - '.github/workflows/frontend-architecture.yml'
  push:
    branches: [ main ]
    paths:
      - 'taxonomy-app/src/main/resources/static/js/**'
      - 'taxonomy-app/src/main/resources/templates/index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  api-boundaries:
    name: Enforce frontend API module boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 1

      - name: Apply final EN/DE architecture documentation alignment
        if: github.head_ref == 'qa/complete-open-points' && hashFiles('.github/scripts/apply-final-doc-alignment.py') != ''
        run: |
          python3 .github/scripts/apply-final-doc-alignment.py
          git diff --check
          python3 .github/scripts/check-doc-links.py
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: align database and test architecture with current runtime'
          git push origin HEAD:qa/complete-open-points

      - name: Reject new direct API calls outside api modules
        run: python3 .github/scripts/check-frontend-api-boundaries.py
