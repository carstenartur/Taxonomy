# ── HSQLDB profile (default) ──────────────────────────────────────────────────
# In-memory database for local development and tests.
# Override TAXONOMY_DATASOURCE_URL for disk-backed deployments, e.g.:
#   jdbc:hsqldb:file:/app/data/taxonomydb;hsqldb.default_table_type=cached;hsqldb.write_delay_millis=0;shutdown=true
#
# The production example disables HSQLDB's delayed log fsync so an acknowledged
# architecture change is durable before a container replacement begins.
#
# HikariCP deliberately keeps one connection open for the lifetime of the
# application. This is required for file databases using shutdown=true: a
# non-pooled DriverDataSource would temporarily have zero connections between
# startup transactions and HSQLDB would start shutting down while Spring is
# still initializing.

spring.datasource.url=${TAXONOMY_DATASOURCE_URL:jdbc:hsqldb:mem:taxonomydb;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=org.hsqldb.jdbc.JDBCDriver
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.minimum-idle=${TAXONOMY_DB_MIN_IDLE:1}
spring.datasource.hikari.maximum-pool-size=${TAXONOMY_DB_MAX_POOL_SIZE:4}
spring.datasource.hikari.connection-timeout=${TAXONOMY_DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.pool-name=taxonomy-hsqldb
# Explicit dialect keeps startup deterministic for both in-memory and file URLs.
spring.jpa.database-platform=org.hibernate.dialect.HSQLDialect

# jgit-storage-hibernate owns git_packs and git_reflog through its released
# Flyway migration stream. Hibernate still validates these mapped entities but
# does not create, update, truncate, or drop the two library-owned tables.
spring.flyway.enabled=true
spring.jpa.properties.hibernate.hbm2ddl.schema_filter_provider=com.taxonomy.dsl.storage.JgitStorageHibernateSchemaFilterProvider
# One-time, fail-closed adoption of Taxonomy's pre-library pack schema.
# Enable only after backup and the documented read-only preflight.
taxonomy.jgit-storage.legacy-adoption=${TAXONOMY_JGIT_STORAGE_LEGACY_ADOPTION:false}
