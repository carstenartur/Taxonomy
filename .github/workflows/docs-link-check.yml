name: Documentation Links

on:
  push:
    branches: [ "**" ]
    paths:
      - '**/*.md'
      - 'docs/images/**'
      - 'taxonomy-app/src/main/resources/templates/index.html'
      - '.github/scripts/check-doc-links.py'
      - '.github/workflows/docs-link-check.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.md'
      - 'docs/images/**'
      - 'taxonomy-app/src/main/resources/templates/index.html'
      - '.github/scripts/check-doc-links.py'
      - '.github/workflows/docs-link-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-doc-links:
    name: Check local documentation links and images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Check local Markdown links and image targets
        run: python3 .github/scripts/check-doc-links.py
