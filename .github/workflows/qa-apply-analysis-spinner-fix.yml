name: Apply analysis spinner fix

on:
  push:
    branches: [ qa/expanded-ui-a11y-verified ]
    paths:
      - '.github/workflows/qa-apply-analysis-spinner-fix.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: qa/expanded-ui-a11y-verified

      - name: Preserve spinner across repeated analyses
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('taxonomy-app/src/main/resources/static/js/core/taxonomy-scoring.js')
          text = path.read_text(encoding='utf-8')
          old = """    function setAnalyzing(on) {
                  const btn = document.getElementById('analyzeBtn');
                  const spinner = document.getElementById('analyzeSpinner');
                  btn.disabled = on;
                  spinner.classList.toggle('d-none', !on);
                  btn.textContent = on ? ' ' + t('scoring.analyzing') : t('scoring.analyze.btn');
                  if (on) btn.prepend(spinner);
              }
          """
          new = """    function setAnalyzing(on) {
                  const btn = document.getElementById('analyzeBtn');
                  if (!btn) { return; }

                  let spinner = document.getElementById('analyzeSpinner');
                  if (!spinner) {
                      spinner = document.createElement('span');
                      spinner.id = 'analyzeSpinner';
                      spinner.className = 'spinner-border spinner-border-sm me-1';
                      spinner.setAttribute('role', 'status');
                      spinner.setAttribute('aria-hidden', 'true');
                  }

                  btn.disabled = on;
                  spinner.classList.toggle('d-none', !on);
                  const label = on ? t('scoring.analyzing') : t('scoring.analyze.btn');
                  btn.replaceChildren(spinner, document.createTextNode(' ' + label));
              }
          """
          if old not in text:
              raise SystemExit('Expected setAnalyzing block was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

          rm .github/workflows/qa-apply-analysis-spinner-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add taxonomy-app/src/main/resources/static/js/core/taxonomy-scoring.js \
                  .github/workflows/qa-apply-analysis-spinner-fix.yml
          git commit -m 'fix: preserve analysis spinner across repeated runs'
          git push origin HEAD:qa/expanded-ui-a11y-verified
