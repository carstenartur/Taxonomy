name: Compile Diagnostics

on:
  push:
    branches: [ "qa/senior-architecture-ergonomics-hardening" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Compile reactor and preserve complete log
        id: compile
        shell: bash
        run: |
          mkdir -p target
          set +e
          set -o pipefail
          mvn -B -DskipTests package 2>&1 | tee target/maven-build.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload complete Maven log
        uses: actions/upload-artifact@v7
        with:
          name: maven-build-log
          path: target/maven-build.log
          retention-days: 14

      - name: Fail when Maven failed
        if: steps.compile.outputs.exit_code != '0'
        run: exit 1
