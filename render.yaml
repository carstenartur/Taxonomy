services:
  - type: web
    name: taxonomy-analyzer
    runtime: docker
    plan: free
    healthCheckPath: /api/status/startup
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # set manually in the Render dashboard
      - key: TAXONOMY_EMBEDDING_ENABLED
        value: "false"        # DJL/ONNX model uses ~80–140 MB native memory; disable on the 512 MB free tier
      - key: TAXONOMY_INIT_ASYNC
        value: "true"         # load taxonomy after Tomcat opens its port so Render detects the port quickly
      - key: TAXONOMY_LAZY_INIT
        value: "true"         # lazy bean initialization reduces Spring context startup time significantly
      - key: TAXONOMY_THYMELEAF_CACHE
        value: "true"         # cache Thymeleaf templates in production for faster response times
      - key: TAXONOMY_SPRINGDOC_ENABLED
        value: "false"         # disable Swagger UI in production to save memory and reduce attack surface
