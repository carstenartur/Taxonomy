# ── Oracle Database profile ────────────────────────────────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=oracle
# Requires Oracle JDBC driver (ojdbc11 — already bundled as runtime dependency).

spring.datasource.url=${TAXONOMY_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/taxonomy}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:taxonomy}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:taxonomy}
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# ── HikariCP connection pool tuning for Oracle ────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.initialization-fail-timeout=60000
