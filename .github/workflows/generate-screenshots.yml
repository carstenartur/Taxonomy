name: Generate Documentation Screenshots

on:
  workflow_dispatch:
  push:
    branches: [main, 'copilot/**']
    paths:
      - 'src/main/resources/templates/**'
      - 'src/main/resources/static/**'
      - 'src/test/java/**/ScreenshotGeneratorIT.java'

jobs:
  screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Generate screenshots
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: mvn verify -DgenerateScreenshots -Dit.test=ScreenshotGeneratorIT -Dfailsafe.rerunFailingTestsCount=1

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/images/*.png
          if git diff --cached --quiet; then
            echo "No new screenshots to commit"
          else
            git commit -m "docs: auto-generate UI screenshots [skip ci]"
            git push
          fi
