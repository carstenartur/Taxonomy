name: Apply accessible export and offline feedback

on:
  push:
    branches: [ qa/expanded-ui-a11y-verified ]
    paths:
      - '.github/workflows/qa-apply-export-offline-feedback.yml'

permissions:
  contents: write

jobs:
  apply-feedback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: qa/expanded-ui-a11y-verified

      - name: Replace native export alerts and render offline sync state
        run: |
          python3 - <<'PY'
          from pathlib import Path

          export = Path('taxonomy-app/src/main/resources/static/js/shared/taxonomy-export.js')
          text = export.read_text(encoding='utf-8')
          marker = "    var t = TaxonomyI18n.t;\n"
          helper = """    var t = TaxonomyI18n.t;

    function showExportError(message) {
        if (window.TaxonomyOperationResult) {
            window.TaxonomyOperationResult.showError(t('export.feedback.error.title'), message);
        } else {
            console.error('[Taxonomy] Export failed:', message);
        }
    }

    function showExportSuccess(message) {
        if (window.TaxonomyOperationResult) {
            window.TaxonomyOperationResult.showSuccess(t('export.feedback.success.title'), message);
        }
    }
"""
          if marker not in text:
              raise SystemExit('Export module marker not found')
          text = text.replace(marker, helper, 1)
          text = text.replace('alert(', 'showExportError(')
          old = """        .then(function (blob) {
            downloadBlob(blob, 'requirement-architecture.vsdx');
        })
"""
          new = """        .then(function (blob) {
            downloadBlob(blob, 'requirement-architecture.vsdx');
            showExportSuccess(t('export.feedback.success.detail'));
        })
"""
          if old not in text:
              raise SystemExit('Visio success block not found')
          text = text.replace(old, new, 1)
          export.write_text(text, encoding='utf-8')

          sync = Path('taxonomy-app/src/main/resources/static/js/workspace/taxonomy-workspace-sync.js')
          text = sync.read_text(encoding='utf-8')
          old = """            .catch(function () {
                // silently ignore — non-critical
            });
"""
          new = """            .catch(function () {
                renderOfflineState();
            });
"""
          if old not in text:
              raise SystemExit('Sync polling catch block not found')
          text = text.replace(old, new, 1)
          marker = """    // ── Sync Indicator (appended to Git Status Bar) ─────────────────

    function renderSyncIndicator(state) {
"""
          replacement = """    // ── Sync Indicator (appended to Git Status Bar) ─────────────────

    function renderOfflineState() {
        var state = { syncStatus: 'OFFLINE' };
        syncState = state;
        renderSyncIndicator(state);
        var panel = document.getElementById('syncStatePanel');
        if (panel) {
            panel.innerHTML = '<div class="alert alert-warning py-2 mb-0" role="status" aria-live="polite">' +
                '<strong>' + escapeHtml(t('workspace.sync.offline')) + '</strong><br>' +
                '<span class="small">' + escapeHtml(t('workspace.sync.offline.detail')) + '</span></div>';
        }
    }

    function renderSyncIndicator(state) {
"""
          if marker not in text:
              raise SystemExit('Sync indicator marker not found')
          text = text.replace(marker, replacement, 1)
          old = """        } else if (status === 'DIVERGED') {
            dot = 'error';
            label = t('workspace.sync.status.diverged');
        }
"""
          new = """        } else if (status === 'DIVERGED') {
            dot = 'error';
            label = t('workspace.sync.status.diverged');
        } else if (status === 'OFFLINE') {
            dot = 'error';
            label = t('workspace.sync.offline');
        }
"""
          if old not in text:
              raise SystemExit('Sync status mapping block not found')
          text = text.replace(old, new, 1)
          sync.write_text(text, encoding='utf-8')

          index = Path('taxonomy-app/src/main/resources/templates/index.html')
          text = index.read_text(encoding='utf-8')
          text = text.replace(
              'onclick="TaxonomyWorkspaceSync.syncFromShared()" th:title=',
              'onclick="TaxonomyWorkspaceSync.syncFromShared()" data-required-roles="ADMIN" th:title=',
              1)
          text = text.replace(
              'onclick="TaxonomyWorkspaceSync.publish()" th:title=',
              'onclick="TaxonomyWorkspaceSync.publish()" data-required-roles="ADMIN" th:title=',
              1)
          index.write_text(text, encoding='utf-8')

          bundles = {
              'taxonomy-app/src/main/resources/i18n/messages.properties': [
                  'export.feedback.error.title=Export failed',
                  'export.feedback.success.title=Export ready',
                  'export.feedback.success.detail=The export download is ready.',
                  'workspace.sync.offline=Offline',
                  'workspace.sync.offline.detail=The team repository status cannot be reached. Check the connection and retry.'
              ],
              'taxonomy-app/src/main/resources/i18n/messages_de.properties': [
                  'export.feedback.error.title=Export fehlgeschlagen',
                  'export.feedback.success.title=Export bereit',
                  'export.feedback.success.detail=Der Export steht zum Download bereit.',
                  'workspace.sync.offline=Offline',
                  'workspace.sync.offline.detail=Der Status des Team-Repositorys ist nicht erreichbar. Verbindung prüfen und erneut versuchen.'
              ]
          }
          for filename, lines in bundles.items():
              path = Path(filename)
              existing = path.read_text(encoding='utf-8')
              additions = [line for line in lines if line.split('=', 1)[0] + '=' not in existing]
              if additions:
                  path.write_text(existing.rstrip() + '\n\n# Accessible export and workspace-sync feedback\n' + '\n'.join(additions) + '\n', encoding='utf-8')
          PY

          rm .github/workflows/qa-apply-export-offline-feedback.yml
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add taxonomy-app/src/main/resources/static/js/shared/taxonomy-export.js \
                  taxonomy-app/src/main/resources/static/js/workspace/taxonomy-workspace-sync.js \
                  taxonomy-app/src/main/resources/templates/index.html \
                  taxonomy-app/src/main/resources/i18n/messages.properties \
                  taxonomy-app/src/main/resources/i18n/messages_de.properties \
                  .github/workflows/qa-apply-export-offline-feedback.yml
          git commit -m 'fix: provide accessible export and offline sync feedback'
          git push origin HEAD:qa/expanded-ui-a11y-verified
