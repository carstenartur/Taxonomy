name: Generate Documentation Screenshots

on:
  workflow_dispatch:
  push:
    branches: [main, 'copilot/**']
    paths:
      - 'taxonomy-app/src/main/resources/templates/**'
      - 'taxonomy-app/src/main/resources/static/**'
      - 'taxonomy-app/src/test/java/**/ScreenshotGeneratorIT.java'

permissions:
  contents: read
  packages: read

env:
  BGE_MODEL_REVISION: 5c38ec7c405ec4b44b94cc5a9bb96e735b38267a
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Java 21 and GitHub Packages
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Cache DJL embedding model
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.djl.ai
          key: djl-bge-small-v1-${{ runner.os }}-${{ env.BGE_MODEL_REVISION }}

      - name: Download pinned embedding model
        env:
          MODEL_REVISION: ${{ env.BGE_MODEL_REVISION }}
        run: |
          set -euo pipefail
          mkdir -p models/bge-small-en-v1.5
          cd models/bge-small-en-v1.5
          base="https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/${MODEL_REVISION}"
          curl -fsL -o model.onnx "$base/onnx/model.onnx"
          curl -fsL -o tokenizer.json "$base/tokenizer.json"
          curl -fsL -o tokenizer_config.json "$base/tokenizer_config.json"
          curl -fsL -o special_tokens_map.json "$base/special_tokens_map.json"
          curl -fsL -o config.json "$base/config.json"
          printf 'engine=OnnxRuntime\noption.modelName=model\ntranslatorFactory=ai.djl.huggingface.tokenizers.HuggingFaceTokenizer\n' > serving.properties

      - name: Verify embedding model
        run: |
          echo "=== Model directory contents ==="
          ls -la models/bge-small-en-v1.5/
          echo "=== serving.properties content ==="
          cat -A models/bge-small-en-v1.5/serving.properties
          echo "=== model.onnx size ==="
          stat --format='%s bytes' models/bge-small-en-v1.5/model.onnx

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Generate screenshots
        run: mvn verify -DgenerateScreenshots -Dit.test=ScreenshotGeneratorIT -Dfailsafe.rerunFailingTestsCount=1
        env:
          LLM_PROVIDER: LOCAL_ONNX
          TAXONOMY_EMBEDDING_MODEL_DIR: ${{ github.workspace }}/models/bge-small-en-v1.5
          TAXONOMY_EMBEDDING_ALLOW_DOWNLOAD: 'false'

      - name: Commit screenshots
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/images/*.png
          if git diff --cached --quiet; then
            echo "No new screenshots to commit"
          else
            git commit -m "docs: auto-generate UI screenshots [skip ci]"
            git push
          fi