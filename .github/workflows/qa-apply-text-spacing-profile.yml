name: Apply text spacing profile support

on:
  push:
    branches: [ qa/expanded-ui-a11y-verified ]
    paths:
      - '.github/workflows/qa-apply-text-spacing-profile.yml'

permissions:
  contents: write

jobs:
  apply-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: qa/expanded-ui-a11y-verified

      - name: Patch text spacing validation and execution
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/ui-role-state-acceptance.mjs')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  "const forcedColors = process.env.TAXONOMY_FORCED_COLORS === 'true';\n",
                  "const forcedColors = process.env.TAXONOMY_FORCED_COLORS === 'true';\nconst textSpacing = process.env.TAXONOMY_TEXT_SPACING === 'true';\n"
              ),
              (
                  "    || declaredProfile.zoom !== zoom || Boolean(declaredProfile.forcedColors) !== forcedColors) {\n",
                  "    || declaredProfile.zoom !== zoom\n    || Boolean(declaredProfile.forcedColors) !== forcedColors\n    || Boolean(declaredProfile.textSpacing) !== textSpacing) {\n"
              ),
              (
                  "  await page.locator('#mainContent').waitFor({ state: 'visible', timeout: 60_000 });\n",
                  "  await page.locator('#mainContent').waitFor({ state: 'visible', timeout: 60_000 });\n  if (textSpacing) {\n    await page.addStyleTag({ content: `\n      * { line-height: 1.5 !important; letter-spacing: 0.12em !important; word-spacing: 0.16em !important; }\n      p { margin-bottom: 2em !important; }\n    ` });\n    passed('WCAG text spacing applied');\n  }\n"
              ),
              (
                  "    effectiveViewport, zoom, forcedColors, checks, findings,\n",
                  "    effectiveViewport, zoom, forcedColors, textSpacing, checks, findings,\n"
              )
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Expected block was not found: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

          rm .github/workflows/qa-apply-text-spacing-profile.yml
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .github/scripts/ui-role-state-acceptance.mjs \
                  .github/workflows/qa-apply-text-spacing-profile.yml
          git commit -m 'qa: enforce WCAG text spacing profile'
          git push origin HEAD:qa/expanded-ui-a11y-verified
