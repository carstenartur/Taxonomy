name: Generate Documentation Screenshots

on:
  workflow_dispatch:
  push:
    branches: [main, 'copilot/**']
    paths:
      - 'taxonomy-app/src/main/resources/templates/**'
      - 'taxonomy-app/src/main/resources/static/**'
      - 'taxonomy-app/src/test/java/**/ScreenshotGeneratorIT.java'

jobs:
  screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache DJL embedding model
        uses: actions/cache@v5
        with:
          path: ~/.djl.ai
          key: djl-bge-small-v1-${{ runner.os }}

      - name: Download embedding model
        run: |
          mkdir -p models/bge-small-en-v1.5
          cd models/bge-small-en-v1.5
          curl -fsL -o model.onnx https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/onnx/model.onnx
          curl -fsL -o tokenizer.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/tokenizer.json
          curl -fsL -o tokenizer_config.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/tokenizer_config.json
          curl -fsL -o special_tokens_map.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/special_tokens_map.json
          curl -fsL -o config.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/config.json
          # DJL requires serving.properties to recognize a local model directory.
          # Use printf instead of heredoc to avoid YAML indentation leaking into file content.
          printf 'engine=OnnxRuntime\noption.modelName=model\ntranslatorFactory=ai.djl.huggingface.tokenizers.HuggingFaceTokenizer\n' > serving.properties

      - name: Verify embedding model
        run: |
          echo "=== Model directory contents ==="
          ls -la models/bge-small-en-v1.5/
          echo "=== serving.properties content (cat -A shows invisible chars) ==="
          cat -A models/bge-small-en-v1.5/serving.properties
          echo "=== model.onnx size ==="
          stat --format='%s bytes' models/bge-small-en-v1.5/model.onnx

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Generate screenshots
        run: mvn verify -DgenerateScreenshots -Dit.test=ScreenshotGeneratorIT -Dfailsafe.rerunFailingTestsCount=1
        env:
          LLM_PROVIDER: LOCAL_ONNX
          TAXONOMY_EMBEDDING_MODEL_DIR: ${{ github.workspace }}/models/bge-small-en-v1.5
          TAXONOMY_EMBEDDING_ALLOW_DOWNLOAD: 'false'

      - name: Commit screenshots
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/images/*.png
          if git diff --cached --quiet; then
            echo "No new screenshots to commit"
          else
            git commit -m "docs: auto-generate UI screenshots [skip ci]"
            git push
          fi
