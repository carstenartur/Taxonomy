name: Core Integration

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'pom.xml'
      - 'taxonomy-*/pom.xml'
      - 'taxonomy-app/src/**'
      - 'taxonomy-domain/src/**'
      - 'taxonomy-dsl/src/**'
      - 'taxonomy-export/src/**'
      - 'taxonomy-extension-api/src/**'
      - 'Dockerfile'
      - '.github/workflows/core-integration.yml'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  BGE_MODEL_REVISION: 5c38ec7c405ec4b44b94cc5a9bb96e735b38267a

jobs:
  core-testcontainers:
    name: ${{ matrix.test }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        test:
          - DiagnosticsContainerIT
          - DiagnosticsWithApiKeyContainerIT
          - CoreUiAcceptanceIT
          - ProductionPersistenceRestartIT

    steps:
      - uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Download and verify pinned embedding model
        env:
          MODEL_REVISION: ${{ env.BGE_MODEL_REVISION }}
        run: bash .github/scripts/download-embedding-model.sh

      - name: Install reactor without running tests
        run: mvn -B -pl taxonomy-app -am install -DskipTests

      - name: Run focused Testcontainers integration test
        env:
          TAXONOMY_EMBEDDING_MODEL_DIR: ${{ github.workspace }}/models/bge-small-en-v1.5
          TAXONOMY_EMBEDDING_ALLOW_DOWNLOAD: 'false'
        run: >-
          mvn -B -pl taxonomy-app
          failsafe:integration-test failsafe:verify
          -DskipITs=false
          -Dit.test=${{ matrix.test }}
          -DfailIfNoTests=false
          -DexcludedGroups=real-llm,db-postgres,db-mssql,db-oracle

      - name: Upload integration-test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-${{ matrix.test }}
          path: taxonomy-app/target/failsafe-reports/**
          if-no-files-found: warn
          retention-days: 14
