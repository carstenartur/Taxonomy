<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{password.change.title} + ' — ' + #{app.title}">Change Password — Taxonomy Architecture Analyzer</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/dist/css/bootstrap.min.css}"
          href="/webjars/bootstrap/5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<a href="#changePasswordForm" class="visually-hidden-focusable position-absolute top-0 start-0 p-2 bg-primary text-white">
    Skip to password form
</a>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 card-title text-center mb-4">🔑 <span th:text="#{password.change.title}">Change Password</span></h1>

                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" role="status" aria-live="polite" th:text="${success}"></div>

                    <form id="changePasswordForm" method="post" th:action="@{/change-password}">
                        <div class="mb-3">
                            <label for="currentPassword" class="form-label" th:text="#{password.current}">Current Password</label>
                            <input type="password" class="form-control" id="currentPassword"
                                   name="currentPassword" required autofocus autocomplete="current-password"/>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label" th:text="#{password.new}">New Password</label>
                            <input type="password" class="form-control" id="newPassword"
                                   name="newPassword" required minlength="12" autocomplete="new-password"
                                   aria-describedby="newPasswordHelp"/>
                            <div id="newPasswordHelp" class="form-text" th:text="#{password.min.length}">Minimum 12 characters.</div>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label" th:text="#{password.confirm}">Confirm New Password</label>
                            <input type="password" class="form-control" id="confirmPassword"
                                   name="confirmPassword" required minlength="12" autocomplete="new-password"/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" th:text="#{password.btn.change}">Change Password</button>
                    </form>

                    <div class="mt-3 text-center">
                        <a th:href="@{/}" class="text-decoration-none" th:text="#{password.back}">← Back to Application</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
