name: Generate Documentation Screenshots

on:
  workflow_dispatch:
  push:
    branches: [main, 'copilot/**']
    paths:
      - 'taxonomy-app/src/main/resources/templates/**'
      - 'taxonomy-app/src/main/resources/static/**'
      - 'taxonomy-app/src/test/java/**/ScreenshotGeneratorIT.java'

jobs:
  screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache DJL embedding model
        uses: actions/cache@v4
        with:
          path: ~/.djl.ai/cache/taxonomy
          key: embedding-model-bge-small-en-v1.5

      - name: Download embedding model
        run: |
          MODEL_DIR=~/.djl.ai/cache/taxonomy/BAAI--bge-small-en-v1.5
          mkdir -p "$MODEL_DIR"
          cd "$MODEL_DIR"
          # Idempotent: skip files that already exist from the cache
          [ -s model.onnx ] || curl -fsL -o model.onnx https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/onnx/model.onnx
          [ -s tokenizer.json ] || curl -fsL -o tokenizer.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/tokenizer.json
          [ -s tokenizer_config.json ] || curl -fsL -o tokenizer_config.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/tokenizer_config.json
          [ -s special_tokens_map.json ] || curl -fsL -o special_tokens_map.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/special_tokens_map.json
          [ -s config.json ] || curl -fsL -o config.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/config.json
          # Write version marker for stale-cache detection
          echo -n "https://huggingface.co/BAAI/bge-small-en-v1.5" > model.source

      - name: Verify embedding model
        run: |
          MODEL_DIR=~/.djl.ai/cache/taxonomy/BAAI--bge-small-en-v1.5
          echo "=== Model directory contents ==="
          ls -la "$MODEL_DIR"
          echo "=== model.onnx size ==="
          stat --format='%s bytes' "$MODEL_DIR/model.onnx"

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Generate screenshots
        run: mvn verify -DgenerateScreenshots -Dit.test=ScreenshotGeneratorIT -Dfailsafe.rerunFailingTestsCount=1 -Dembedding.model.dir="$HOME/.djl.ai/cache/taxonomy/BAAI--bge-small-en-v1.5"
        env:
          LLM_PROVIDER: LOCAL_ONNX
          TAXONOMY_EMBEDDING_ALLOW_DOWNLOAD: 'false'

      - name: Commit screenshots
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/images/*.png
          if git diff --cached --quiet; then
            echo "No new screenshots to commit"
          else
            git commit -m "docs: auto-generate UI screenshots [skip ci]"
            git push
          fi
