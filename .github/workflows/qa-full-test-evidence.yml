name: QA Full Reactor Evidence

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'taxonomy-app/src/main/java/com/taxonomy/provenance/**'
      - 'taxonomy-app/src/test/java/com/taxonomy/provenance/**'
      - '.github/workflows/qa-full-test-evidence.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-reactor-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Download and verify pinned embedding model
        env:
          MODEL_REVISION: 5c38ec7c405ec4b44b94cc5a9bb96e735b38267a
        run: bash .github/scripts/download-embedding-model.sh

      - name: Run complete reactor and retain exit code
        id: reactor
        continue-on-error: true
        env:
          TAXONOMY_EMBEDDING_MODEL_DIR: ${{ github.workspace }}/models/bge-small-en-v1.5
          TAXONOMY_EMBEDDING_ALLOW_DOWNLOAD: 'false'
        shell: bash
        run: |
          mkdir -p target/qa-full-reactor
          set -o pipefail
          mvn -B install -DexcludedGroups="real-llm" \
            2>&1 | tee target/qa-full-reactor/maven.log

      - name: Archive complete failure evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: qa-full-reactor-evidence
          path: |
            target/qa-full-reactor/maven.log
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          if-no-files-found: error
          retention-days: 14

      - name: Propagate reactor result
        if: steps.reactor.outcome != 'success'
        run: exit 1
