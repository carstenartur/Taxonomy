name: Frontend Architecture

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'taxonomy-app/src/main/resources/static/js/**'
      - 'taxonomy-app/src/main/resources/templates/index.html'
      - '.github/scripts/check-frontend-api-boundaries.py'
      - '.github/scripts/apply-codemirror-a11y-fix.py'
      - '.github/workflows/frontend-architecture.yml'
  push:
    branches: [ main ]
    paths:
      - 'taxonomy-app/src/main/resources/static/js/**'
      - 'taxonomy-app/src/main/resources/templates/index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  api-boundaries:
    name: Enforce frontend API module boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply reviewed CodeMirror accessibility correction
        if: github.head_ref == 'qa/complete-open-points' && hashFiles('.github/scripts/apply-codemirror-a11y-fix.py') != ''
        run: |
          python3 .github/scripts/apply-codemirror-a11y-fix.py
          node --check taxonomy-app/src/main/resources/static/js/shared/taxonomy-dsl-codemirror.mjs
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: resolve CodeMirror contrast and scroll accessibility'
          git push origin HEAD:qa/complete-open-points

      - name: Reject new direct API calls outside api modules
        run: python3 .github/scripts/check-frontend-api-boundaries.py
