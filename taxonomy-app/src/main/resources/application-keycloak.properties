# ═══════════════════════════════════════════════════════════════
# Keycloak / OIDC Profile Configuration
# ═══════════════════════════════════════════════════════════════
# Activate with: SPRING_PROFILES_ACTIVE=keycloak
# This profile replaces form-login with Keycloak OIDC authentication.

# --- OAuth2 Client (Browser-SSO) ---
spring.security.oauth2.client.registration.keycloak.client-id=${KEYCLOAK_CLIENT_ID:taxonomy-app}
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email,roles
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.keycloak.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/taxonomy}
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username

# --- OAuth2 Resource Server (JWT for REST API) ---
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/taxonomy}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/taxonomy/protocol/openid-connect/certs}

# --- Keycloak-specific ---
taxonomy.keycloak.role-claim-path=realm_access.roles
taxonomy.keycloak.role-prefix=ROLE_
taxonomy.keycloak.admin-console-url=${KEYCLOAK_ADMIN_URL:http://localhost:8180}

# --- Features disabled in Keycloak mode ---
taxonomy.security.local-users-enabled=false
taxonomy.security.change-password-enabled=false

# --- Session timeout (align with Keycloak SSO session) ---
server.servlet.session.timeout=30m
