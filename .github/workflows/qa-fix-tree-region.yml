name: QA Apply Final UI Semantics Fixes

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/qa-fix-tree-region.yml'

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: qa/expanded-ui-a11y-verified
          persist-credentials: true
          fetch-depth: 0
      - name: Apply validated UI semantics fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          utils = Path('taxonomy-app/src/main/resources/static/js/shared/taxonomy-utils.js')
          source = utils.read_text(encoding='utf-8')
          old = """        } else {
              tree.removeAttribute('role');
              tree.setAttribute('aria-busy', 'true');
          }
"""
          new = """        } else {
              tree.setAttribute('role', 'region');
              tree.setAttribute('aria-busy', 'true');
          }
"""
          if source.count(old) != 1:
              raise SystemExit('Unexpected taxonomy tree fallback contract')
          utils.write_text(source.replace(old, new), encoding='utf-8')

          document_import = Path('taxonomy-app/src/main/resources/static/js/shared/taxonomy-document-import.js')
          source = document_import.read_text(encoding='utf-8')
          replacements = {
              "        reviewPanel.removeAttribute('style');": "        reviewPanel.setAttribute('data-result-visible', 'true');",
              "        aiResultPanel.removeAttribute('style');": "        aiResultPanel.setAttribute('data-result-visible', 'true');",
              "        regMapPanel.removeAttribute('style');": "        regMapPanel.setAttribute('data-result-visible', 'true');",
              "        if (reviewPanel) reviewPanel.style.display = 'none';": "        if (reviewPanel) reviewPanel.setAttribute('data-result-visible', 'false');",
              "        if (aiResultPanel) aiResultPanel.style.display = 'none';": "        if (aiResultPanel) aiResultPanel.setAttribute('data-result-visible', 'false');",
              "        if (regMapPanel) regMapPanel.style.display = 'none';": "        if (regMapPanel) regMapPanel.setAttribute('data-result-visible', 'false');",
          }
          for old_text, new_text in replacements.items():
              if source.count(old_text) != 1:
                  raise SystemExit(f'Unexpected document import visibility contract: {old_text}')
              source = source.replace(old_text, new_text)
          document_import.write_text(source, encoding='utf-8')

          css = Path('taxonomy-app/src/main/resources/static/css/taxonomy-ergonomics.css')
          source = css.read_text(encoding='utf-8')
          old = """/* Legacy document-import code uses the inline display value as a state marker.
   CSP blocks the inline declaration itself, therefore external CSS maps the
   marker to the intended visible/hidden state. */
#docCandidateReviewPanel[style*=\"display:none\"],
#docAiResultPanel[style*=\"display:none\"],
#docRegMapResultPanel[style*=\"display:none\"] {
    display: none !important;
}
#docCandidateReviewPanel:not([style*=\"display:none\"]),
#docAiResultPanel:not([style*=\"display:none\"]),
#docRegMapResultPanel:not([style*=\"display:none\"]) {
    display: block !important;
}
"""
          new = """/* Document-import result surfaces use an explicit application state instead of
   inline styles, keeping visibility deterministic under the strict CSP. */
#docCandidateReviewPanel,
#docAiResultPanel,
#docRegMapResultPanel {
    display: none !important;
}
#docCandidateReviewPanel[data-result-visible=\"true\"],
#docAiResultPanel[data-result-visible=\"true\"],
#docRegMapResultPanel[data-result-visible=\"true\"] {
    display: block !important;
}
"""
          if source.count(old) != 1:
              raise SystemExit('Unexpected document import CSS contract')
          css.write_text(source.replace(old, new), encoding='utf-8')
          PY
          node --check taxonomy-app/src/main/resources/static/js/shared/taxonomy-utils.js
          node --check taxonomy-app/src/main/resources/static/js/shared/taxonomy-document-import.js
          grep -n -A5 -B2 "function syncTreeContainerSemantics" taxonomy-app/src/main/resources/static/js/shared/taxonomy-utils.js
          grep -n "data-result-visible" taxonomy-app/src/main/resources/static/js/shared/taxonomy-document-import.js taxonomy-app/src/main/resources/static/css/taxonomy-ergonomics.css
      - name: Commit patch and remove helper workflow
        run: |
          rm .github/workflows/qa-fix-tree-region.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add taxonomy-app/src/main/resources/static/js/shared/taxonomy-utils.js \
                  taxonomy-app/src/main/resources/static/js/shared/taxonomy-document-import.js \
                  taxonomy-app/src/main/resources/static/css/taxonomy-ergonomics.css \
                  .github/workflows/qa-fix-tree-region.yml
          git commit -m "fix(ui): make result and tree semantics CSP-safe"
          git push origin HEAD:qa/expanded-ui-a11y-verified
