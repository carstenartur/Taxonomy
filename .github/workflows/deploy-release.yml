name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version without leading v, for example 1.2.3. Must match the current SNAPSHOT base.'
        required: true
        type: string
      next_development_version:
        description: 'Next development version, for example 1.2.4-SNAPSHOT. Leave empty to increment patch.'
        required: false
        type: string
        default: ''
      skip_tests:
        description: 'Skip tests during release build'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Validate without changing remote refs, releases, deploy hooks or pull requests'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, publish and prepare next development version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Preserve release scripts
        run: |
          cp .github/scripts/release.sh "$RUNNER_TEMP/release.sh"
          cp .github/scripts/update-release-metadata.py \
            "$RUNNER_TEMP/update-release-metadata.py"
          cp .github/scripts/generate-vex.py "$RUNNER_TEMP/generate-vex.py"
          chmod +x "$RUNNER_TEMP/release.sh" \
            "$RUNNER_TEMP/update-release-metadata.py" \
            "$RUNNER_TEMP/generate-vex.py"

      - name: Build, publish and prepare next development version
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          NEXT_VERSION_INPUT: ${{ inputs.next_development_version }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          DRY_RUN: ${{ inputs.dry_run }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          METADATA_HELPER: ${{ runner.temp }}/update-release-metadata.py
          VEX_HELPER: ${{ runner.temp }}/generate-vex.py
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: "$RUNNER_TEMP/release.sh"
