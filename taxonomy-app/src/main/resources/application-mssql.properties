# ── Microsoft SQL Server profile ──────────────────────────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=mssql
# Requires MSSQL JDBC driver (already bundled as runtime dependency).

spring.datasource.url=${TAXONOMY_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=taxonomy;encrypt=false;trustServerCertificate=true}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# ── HikariCP connection pool tuning for MSSQL ────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.initialization-fail-timeout=60000
