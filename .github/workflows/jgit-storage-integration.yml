name: JGit Storage Integration

on:
  pull_request:
    branches: [ main ]
    paths:
      - pom.xml
      - taxonomy-app/pom.xml
      - taxonomy-app/src/main/java/com/taxonomy/TaxonomyApplication.java
      - taxonomy-app/src/main/java/com/taxonomy/dsl/storage/**
      - taxonomy-app/src/main/java/com/taxonomy/preferences/**
      - taxonomy-app/src/main/java/com/taxonomy/workspace/service/WorkspaceManager.java
      - taxonomy-app/src/test/java/com/taxonomy/dsl/storage/**
      - taxonomy-app/src/test/java/com/taxonomy/workspace/service/WorkspaceManagerGitDeletionTest.java
      - .github/workflows/jgit-storage-integration.yml
  push:
    branches: [ main ]
    paths:
      - pom.xml
      - taxonomy-app/pom.xml
      - taxonomy-app/src/main/java/com/taxonomy/TaxonomyApplication.java
      - taxonomy-app/src/main/java/com/taxonomy/dsl/storage/**
      - taxonomy-app/src/main/java/com/taxonomy/preferences/**
      - taxonomy-app/src/main/java/com/taxonomy/workspace/service/WorkspaceManager.java
      - taxonomy-app/src/test/java/com/taxonomy/dsl/storage/**
      - taxonomy-app/src/test/java/com/taxonomy/workspace/service/WorkspaceManagerGitDeletionTest.java
      - .github/workflows/jgit-storage-integration.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: jgit-storage-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  storage-integration:
    name: HSQLDB persistence, reflog and isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Java 21 and GitHub Packages
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Compile and run focused storage integration tests
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAXONOMY_EMBEDDING_ENABLED: 'false'
          TAXONOMY_EMBEDDING_ALLOW_DOWNLOAD: 'false'
        run: |
          mkdir -p target
          set -o pipefail
          mvn --batch-mode --no-transfer-progress \
            -pl taxonomy-app -am \
            -Dtest=JgitStorageHibernateIntegrationTest \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -DfailIfNoTests=false \
            -DexcludedGroups=real-llm \
            test 2>&1 | tee target/jgit-storage-integration.log

      - name: Upload focused Maven log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jgit-storage-integration-log
          path: |
            target/jgit-storage-integration.log
            taxonomy-app/target/surefire-reports/TEST-com.taxonomy.dsl.storage.JgitStorageHibernateIntegrationTest.xml
          if-no-files-found: warn
          retention-days: 14
