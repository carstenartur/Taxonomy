<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>NATO NC3T Taxonomy Browser</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/taxonomy.css}"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-0">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            &#127756; NATO NC3T Taxonomy Browser &mdash; Baseline 7
        </span>
    </div>
</nav>

<div class="container-fluid px-3 pt-3">
    <div class="row g-3">

        <!-- Left: Taxonomy tree -->
        <div class="col-lg-7">
            <div class="card shadow-sm h-100">
                <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <span class="fw-semibold">Taxonomy Tree</span>
                    <div class="d-flex gap-2 align-items-center flex-wrap">
                        <!-- View switcher -->
                        <div class="btn-group" role="group" aria-label="View mode">
                            <button id="viewList"     data-view="list"     class="btn btn-sm btn-primary"          title="Indented list view">&#128203; List</button>
                            <button id="viewTabs"     data-view="tabs"     class="btn btn-sm btn-outline-secondary" title="Tabbed list view">&#128209; Tabs</button>
                            <button id="viewSunburst" data-view="sunburst" class="btn btn-sm btn-outline-secondary" title="Zoomable sunburst chart">&#128262; Sunburst</button>
                            <button id="viewTree"     data-view="tree"     class="btn btn-sm btn-outline-secondary" title="Bottom-up tree diagram">&#127795; Tree</button>
                        </div>
                        <!-- Expand / Collapse (list & tabs only) -->
                        <div id="expandCollapseGroup">
                            <button id="expandAll"   class="btn btn-sm btn-outline-secondary me-1">Expand All</button>
                            <button id="collapseAll" class="btn btn-sm btn-outline-secondary">Collapse All</button>
                        </div>
                        <!-- Taxonomy selector (tree view only) -->
                        <div id="treeRootGroup" style="display:none;">
                            <select id="treeRootSelect" class="form-select form-select-sm" aria-label="Select taxonomy to display"></select>
                        </div>
                        <!-- Show/hide descriptions -->
                        <div class="form-check form-switch mb-0 ms-1 d-flex align-items-center gap-1">
                            <input class="form-check-input" type="checkbox" id="showDescriptions" checked/>
                            <label class="form-check-label small text-nowrap" for="showDescriptions">Descriptions</label>
                        </div>
                    </div>
                </div>
                <div class="card-body overflow-auto" style="max-height:82vh;">
                    <div id="taxonomyTree">
                        <div class="text-center text-muted py-5">
                            <div class="spinner-border spinner-border-sm" role="status"></div>
                            Loading taxonomy&hellip;
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: Analysis panel -->
        <div class="col-lg-5">
            <div class="card shadow-sm mb-3">
                <div class="card-header fw-semibold">Business Requirement Analysis</div>
                <div class="card-body">
                    <label for="businessText" class="form-label">
                        Describe the business requirement or capability need:
                    </label>
                    <textarea id="businessText" class="form-control mb-3" rows="7"
                              placeholder="e.g. We need a system to manage and display real-time air tracks, integrate radar data, and provide a common operational picture to commanders at brigade and above level..."></textarea>
                    <button id="analyzeBtn" class="btn btn-primary w-100">
                        <span id="analyzeSpinner" class="spinner-border spinner-border-sm d-none me-1" role="status"></span>
                        Analyze with AI
                    </button>
                    <div id="aiProviderInfo" class="mt-1 text-muted small d-none"></div>
                </div>
            </div>

            <!-- Legend -->
            <div class="card shadow-sm mb-3">
                <div class="card-body py-2">
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                        <small class="text-muted">Match legend:</small>
                        <span class="legend-box" style="background:rgba(0,128,0,0);">0%</span>
                        <span class="legend-box" style="background:rgba(0,128,0,0.25);">25%</span>
                        <span class="legend-box" style="background:rgba(0,128,0,0.50);">50%</span>
                        <span class="legend-box" style="background:rgba(0,128,0,0.75); color:#fff;">75%</span>
                        <span class="legend-box" style="background:rgba(0,128,0,1.00); color:#fff;">100%</span>
                    </div>
                </div>
            </div>

            <!-- Status / error messages -->
            <div id="statusArea"></div>

            <!-- Analysis log panel (collapsible) -->
            <details id="analysisLog" class="mt-2" style="display:none;">
                <summary class="text-muted small" style="cursor:pointer;">&#128203; Analysis Log</summary>
                <div id="analysisLogContent" class="mt-1 p-2 border rounded small bg-light" style="font-size:0.85em;"></div>
            </details>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script th:src="@{/js/taxonomy-views.js}"></script>
<script th:src="@{/js/taxonomy.js}"></script>
</body>
</html>
