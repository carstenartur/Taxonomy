name: Pipeline Integration Tests (LOCAL_ONNX)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'taxonomy-app/src/main/java/com/taxonomy/service/**'
      - 'taxonomy-app/src/main/java/com/taxonomy/controller/**'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache DJL embedding model
        uses: actions/cache@v4
        with:
          path: ~/.djl.ai/cache/taxonomy
          key: embedding-model-bge-small-en-v1.5

      - name: Download embedding model
        run: |
          MODEL_DIR=~/.djl.ai/cache/taxonomy/BAAI--bge-small-en-v1.5
          mkdir -p "$MODEL_DIR"
          cd "$MODEL_DIR"
          # Idempotent: skip files that already exist from the cache
          [ -s model.onnx ] || curl -fsL -o model.onnx https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/onnx/model.onnx
          [ -s tokenizer.json ] || curl -fsL -o tokenizer.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/tokenizer.json
          [ -s tokenizer_config.json ] || curl -fsL -o tokenizer_config.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/tokenizer_config.json
          [ -s special_tokens_map.json ] || curl -fsL -o special_tokens_map.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/special_tokens_map.json
          [ -s config.json ] || curl -fsL -o config.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/config.json
          # Write version marker for stale-cache detection
          echo -n "https://huggingface.co/BAAI/bge-small-en-v1.5" > model.source

      - name: Build JAR
        run: mvn install -DskipTests -q

      - name: Run Pipeline Tests
        run: mvn failsafe:integration-test failsafe:verify -Dit.test="LocalOnnxPipelineIT,OnnxSeleniumIT" -pl taxonomy-app -am -Dembedding.model.dir="$HOME/.djl.ai/cache/taxonomy/BAAI--bge-small-en-v1.5"
