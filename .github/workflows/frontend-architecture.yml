name: Frontend Architecture

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'taxonomy-app/src/main/resources/static/js/**'
      - 'taxonomy-app/src/main/resources/templates/index.html'
      - 'docs/dev/DEPENDENCY_HYGIENE.md'
      - 'docs/en/DEVELOPER_GUIDE.md'
      - 'docs/de/DEVELOPER_GUIDE.md'
      - '.github/scripts/check-frontend-api-boundaries.py'
      - '.github/workflows/frontend-architecture.yml'
  push:
    branches: [ main ]
    paths:
      - 'taxonomy-app/src/main/resources/static/js/**'
      - 'taxonomy-app/src/main/resources/templates/index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  api-boundaries:
    name: Enforce frontend API module boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 1

      - name: Apply final review documentation corrections
        if: github.head_ref == 'qa/complete-open-points'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          hygiene = Path('docs/dev/DEPENDENCY_HYGIENE.md')
          text = hygiene.read_text(encoding='utf-8')
          old = '1. the Maven Enforcer `includes` list for the exact coordinate; and'
          new = '1. the Maven Enforcer `bannedDependencies/excludes` list for the exact coordinate; and'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('Maven Enforcer exception terminology is neither old nor corrected')
          hygiene.write_text(text, encoding='utf-8')

          repository = 'https://github.com/carstenartur/Taxonomy/blob/main/'
          for name in ('docs/en/DEVELOPER_GUIDE.md', 'docs/de/DEVELOPER_GUIDE.md'):
              path = Path(name)
              guide = path.read_text(encoding='utf-8')
              guide = guide.replace('](../dev/', f']({repository}docs/dev/')
              guide = guide.replace('](../internal/', f']({repository}docs/internal/')
              path.write_text(guide, encoding='utf-8')
          PY
          git diff --check
          python3 .github/scripts/check-doc-links.py
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/dev/DEPENDENCY_HYGIENE.md docs/en/DEVELOPER_GUIDE.md docs/de/DEVELOPER_GUIDE.md
          git diff --staged --quiet && exit 0
          git commit -m 'docs: resolve final dependency and Help-link review findings'
          git push origin HEAD:qa/complete-open-points

      - name: Reject new direct API calls outside api modules
        run: python3 .github/scripts/check-frontend-api-boundaries.py
