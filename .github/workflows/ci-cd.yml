name: CI / CD

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      generate-screenshots:
        description: 'Run screenshot generation (heavy, requires Docker + headless Chrome)'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/taxonomy

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download embedding model
        run: |
          mkdir -p models/bge-small-en-v1.5
          cd models/bge-small-en-v1.5
          curl -fsL -o model.onnx https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/onnx/model.onnx
          curl -fsL -o tokenizer.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/tokenizer.json
          curl -fsL -o tokenizer_config.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/tokenizer_config.json
          curl -fsL -o special_tokens_map.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/special_tokens_map.json
          curl -fsL -o config.json https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/config.json

      - name: Build and run tests
        run: mvn -q install -DexcludedGroups="real-llm"
        env:
          TAXONOMY_EMBEDDING_MODEL_DIR: ${{ github.workspace }}/models/bge-small-en-v1.5

      - name: Generate documentation screenshots
        if: ${{ github.event.inputs.generate-screenshots == 'true' }}
        run: mvn -q verify -DgenerateScreenshots -Dit.test=ScreenshotGeneratorIT -DfailIfNoTests=false -Dfailsafe.rerunFailingTestsCount=1

      - name: Commit generated screenshots
        if: ${{ github.event.inputs.generate-screenshots == 'true' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/images/*.png
          git diff --staged --quiet || git commit -m 'docs: regenerate documentation screenshots [skip ci]'
          git push

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: Maven Tests
          path: '**/target/surefire-reports/TEST-*.xml,**/target/failsafe-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
          max-annotations: '50'

      - name: Generate test HTML reports
        if: always()
        run: |
          mvn site --no-transfer-progress -DskipTests -DgenerateReports=false
          mvn surefire-report:report --no-transfer-progress -DskipTests -Daggregate=true
          # Plugin 3.5.5 writes standalone reports to target/reports/surefire.html;
          # copy into the site directory that gets deployed to GitHub Pages
          cp target/reports/surefire.html target/site/surefire-report.html
          # Inject build metadata so the report always differs from the previous deploy
          sed -i "s|</body>|<!-- Build: ${{ github.sha }} $(date -u +%Y-%m-%dT%H:%M:%SZ) --></body>|" target/site/surefire-report.html

      - name: Verify test report exists
        if: always()
        run: |
          echo "=== Contents of target/site ==="
          ls -la target/site/ || echo "WARNING: target/site does not exist!"
          if [ ! -f target/site/surefire-report.html ]; then
            echo "::error::surefire-report.html was not generated!"
            exit 1
          fi
          echo "surefire-report.html size: $(wc -c < target/site/surefire-report.html) bytes"

      - name: Generate badge JSON files
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import json, os, glob

          COVERAGE_GREEN_THRESHOLD  = 80  # % >= this → brightgreen
          COVERAGE_YELLOW_THRESHOLD = 60  # % >= this → yellow, else red

          # --- Coverage badge ---
          try:
              covered, missed = 0, 0
              for jacoco_file in glob.glob('**/target/site/jacoco/jacoco.xml', recursive=True):
                  tree = ET.parse(jacoco_file)
                  root = tree.getroot()
                  for counter in root.iter('counter'):
                      if counter.get('type') == 'INSTRUCTION':
                          covered += int(counter.get('covered', 0))
                          missed  += int(counter.get('missed', 0))
              total = covered + missed
              pct   = round(covered / total * 100) if total > 0 else 0
              if pct >= COVERAGE_GREEN_THRESHOLD:
                  color = 'brightgreen'
              elif pct >= COVERAGE_YELLOW_THRESHOLD:
                  color = 'yellow'
              else:
                  color = 'red'
              badge = {"schemaVersion": 1, "label": "coverage", "message": f"{pct}%", "color": color}
          except Exception as e:
              print(f"Coverage badge generation failed: {e}")
              badge = {"schemaVersion": 1, "label": "coverage", "message": "unknown", "color": "lightgrey"}
          os.makedirs('taxonomy-app/target/site/jacoco', exist_ok=True)
          with open('taxonomy-app/target/site/jacoco/badge.json', 'w') as f:
              json.dump(badge, f)

          # --- Tests badge ---
          try:
              files = (glob.glob('**/target/surefire-reports/TEST-*.xml', recursive=True) +
                       glob.glob('**/target/failsafe-reports/TEST-*.xml', recursive=True))
              total_tests = total_failures = total_errors = 0
              for path in files:
                  root = ET.parse(path).getroot()
                  total_tests    += int(root.get('tests',    0))
                  total_failures += int(root.get('failures', 0))
                  total_errors   += int(root.get('errors',   0))
              failed = total_failures + total_errors
              passed = total_tests - failed
              if failed > 0:
                  msg, color = f"{failed}/{total_tests} failed", "red"
              else:
                  msg, color = f"{passed} passed", "brightgreen"
              badge = {"schemaVersion": 1, "label": "tests", "message": msg, "color": color}
          except Exception as e:
              print(f"Tests badge generation failed: {e}")
              badge = {"schemaVersion": 1, "label": "tests", "message": "unknown", "color": "lightgrey"}
          os.makedirs('target/site', exist_ok=True)
          with open('target/site/badge.json', 'w') as f:
              json.dump(badge, f)
          EOF

      - name: Deploy test report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always() && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site
          destination_dir: tests
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Surefire test report ${{ github.sha }}'

      - name: Deploy coverage report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always() && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: taxonomy-app/target/site/jacoco
          destination_dir: coverage
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy JaCoCo coverage report'

      - name: Report URLs
        if: always()
        run: |
          echo "### 📊 Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 [View Test Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/tests/surefire-report.html)" >> $GITHUB_STEP_SUMMARY
          echo "📈 [View Coverage Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/coverage/)" >> $GITHUB_STEP_SUMMARY

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: taxonomy-app/target/taxonomy-app-*.jar
          retention-days: 1

  publish-image:
    name: Publish Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    # Only publish from the default branch or the active PR branch
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-render:
    name: Deploy to Render
    needs: publish-image
    runs-on: ubuntu-latest
    # Only deploy from the default branch; requires RENDER_DEPLOY_HOOK_URL secret
    if: >
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
      github.event_name == 'push'
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        if: ${{ env.HOOK_URL != '' }}
        run: |
          curl -fsSL --retry 3 "$HOOK_URL"
          echo "Render deployment triggered."
