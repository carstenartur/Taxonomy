name: Security Scan

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**/pom.xml'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - '.github/workflows/**'
      - '.github/scripts/**'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy dependencies, secrets, and configuration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build application for packaged dependency inspection
        id: package
        shell: bash
        run: |
          mkdir -p target
          set +e
          set -o pipefail
          mvn -B -pl taxonomy-app -am package -Dmaven.test.skip=true 2>&1 | tee target/security-build.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Archive packaging log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-packaging-log
          path: target/security-build.log
          retention-days: 14

      - name: Stop when packaging failed
        if: ${{ steps.package.outputs.exit_code != '0' }}
        run: exit 1

      - name: Scan repository and packaged application
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          format: sarif
          output: trivy-results.sarif
          # Some Trivy versions still return a non-zero status for lower-severity
          # SARIF findings even when the severity filter is HIGH,CRITICAL. Publish
          # every finding, then enforce the intended threshold explicitly below.
          exit-code: '0'

      - name: Enforce HIGH and CRITICAL security threshold
        if: hashFiles('trivy-results.sarif') != ''
        run: |
          python3 - <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          report = json.loads(Path('trivy-results.sarif').read_text(encoding='utf-8'))
          blocking = []
          for run in report.get('runs', []):
              rules = {
                  rule.get('id'): rule
                  for rule in run.get('tool', {}).get('driver', {}).get('rules', [])
              }
              for result in run.get('results', []):
                  rule_id = result.get('ruleId', 'unknown')
                  rule = rules.get(rule_id, {})
                  texts = [
                      result.get('message', {}).get('text', ''),
                      rule.get('help', {}).get('text', ''),
                      rule.get('fullDescription', {}).get('text', ''),
                      ' '.join(rule.get('properties', {}).get('tags', [])),
                  ]
                  evidence = '\n'.join(texts)
                  severity_match = re.search(
                      r'\bSeverity:\s*(CRITICAL|HIGH|MEDIUM|LOW|UNKNOWN)\b',
                      evidence,
                      flags=re.IGNORECASE,
                  )
                  severity = severity_match.group(1).upper() if severity_match else ''
                  if severity in {'HIGH', 'CRITICAL'}:
                      blocking.append((severity, rule_id, result.get('message', {}).get('text', '')))

          if blocking:
              print('Blocking Trivy findings:', file=sys.stderr)
              for severity, rule_id, message in blocking:
                  print(f'- [{severity}] {rule_id}: {message}', file=sys.stderr)
              raise SystemExit(1)

          print('No HIGH or CRITICAL Trivy findings detected.')
          PY

      - name: Upload SARIF to GitHub code scanning
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: taxonomy-trivy

      - name: Archive scanner evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-security-scan
          path: trivy-results.sarif
          if-no-files-found: warn
          retention-days: 90
