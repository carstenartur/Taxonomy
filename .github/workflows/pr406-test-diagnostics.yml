name: PR 406 Test Diagnostics

on:
  push:
    branches: [ "qa/senior-architecture-ergonomics-hardening" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  BGE_MODEL_REVISION: 5c38ec7c405ec4b44b94cc5a9bb96e735b38267a

jobs:
  apply-final-aria-fix:
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/qa/senior-architecture-ergonomics-hardening'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Apply axe-confirmed ARIA structure fix
        run: python3 .github/scripts/apply-final-aria-structure-fix.py
      - name: Commit correction
        run: |
          if git diff --quiet; then
            echo "ARIA structure correction already applied."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add taxonomy-app/src/main/resources/static/js/shared/taxonomy-utils.js
          git commit -m 'fix: correct tablist and tree ARIA containment'
          git push

  full-tests:
    needs: [apply-final-aria-fix]
    if: always() && (needs.apply-final-aria-fix.result == 'success' || needs.apply-final-aria-fix.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Download pinned model
        env:
          MODEL_REVISION: ${{ env.BGE_MODEL_REVISION }}
        run: bash .github/scripts/download-embedding-model.sh
      - name: Run tests and retain complete log
        id: tests
        shell: bash
        env:
          TAXONOMY_EMBEDDING_MODEL_DIR: ${{ github.workspace }}/models/bge-small-en-v1.5
          TAXONOMY_EMBEDDING_ALLOW_DOWNLOAD: 'false'
        run: |
          mkdir -p target
          set +e
          set -o pipefail
          mvn -B install -DexcludedGroups="real-llm" 2>&1 | tee target/pr406-maven-test.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v7
        with:
          name: pr406-maven-test-log
          path: target/pr406-maven-test.log
          retention-days: 7
      - name: Fail on test failure
        if: ${{ steps.tests.outputs.exit_code != '0' }}
        run: exit 1
