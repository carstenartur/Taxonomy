name: CodeQL Source Analysis

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'pom.xml'
      - 'taxonomy-*/pom.xml'
      - 'taxonomy-*/src/**'
      - '.github/scripts/check-codeql-sarif.py'
      - '.github/workflows/codeql.yml'
  push:
    branches: [ main ]
    paths:
      - 'pom.xml'
      - 'taxonomy-*/pom.xml'
      - 'taxonomy-*/src/**'
      - '.github/scripts/check-codeql-sarif.py'
      - '.github/workflows/codeql.yml'
  schedule:
    - cron: '19 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  java:
    name: CodeQL / Java
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      packages: read
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Java 21 and GitHub Packages
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          languages: java-kotlin
          build-mode: manual
          queries: security-extended,security-and-quality

      - name: Build Java reactor for CodeQL
        run: mvn -B -q -pl taxonomy-app -am package -Dmaven.test.skip=true

      - name: Analyze Java to local SARIF
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          category: /language:java-kotlin
          upload: false
          output: codeql-java

      - name: Enforce high-severity Java findings
        run: |
          mapfile -t reports < <(find codeql-java -type f -name '*.sarif' -print)
          test "${#reports[@]}" -gt 0
          python3 .github/scripts/check-codeql-sarif.py \
            --report target/codeql-java-gate.json \
            "${reports[@]}"

      - name: Archive Java SAST evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: codeql-java-sarif
          path: |
            codeql-java/**
            target/codeql-java-gate.json
          if-no-files-found: error
          retention-days: 90

  javascript:
    name: CodeQL / JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          languages: javascript-typescript
          build-mode: none
          queries: security-extended,security-and-quality

      - name: Analyze JavaScript to local SARIF
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          category: /language:javascript-typescript
          upload: false
          output: codeql-javascript

      - name: Enforce high-severity JavaScript findings
        run: |
          mapfile -t reports < <(find codeql-javascript -type f -name '*.sarif' -print)
          test "${#reports[@]}" -gt 0
          python3 .github/scripts/check-codeql-sarif.py \
            --report target/codeql-javascript-gate.json \
            "${reports[@]}"

      - name: Archive JavaScript SAST evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: codeql-javascript-sarif
          path: |
            codeql-javascript/**
            target/codeql-javascript-gate.json
          if-no-files-found: error
          retention-days: 90