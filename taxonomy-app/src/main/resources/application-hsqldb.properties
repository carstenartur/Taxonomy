# ── HSQLDB profile (default) ──────────────────────────────────────────────────
# In-memory database for local development and tests.
# Override TAXONOMY_DATASOURCE_URL for disk-backed deployments, e.g.:
#   jdbc:hsqldb:file:/app/data/taxonomydb;hsqldb.default_table_type=cached;shutdown=true

spring.datasource.url=${TAXONOMY_DATASOURCE_URL:jdbc:hsqldb:mem:taxonomydb;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=org.hsqldb.jdbc.JDBCDriver
# SimpleDriverDataSource bypasses HikariCP entirely — no pool needed for in-process HSQLDB.
# This eliminates connection-pool exhaustion and reduces memory overhead on constrained hosts.
spring.datasource.type=org.springframework.jdbc.datasource.SimpleDriverDataSource
spring.datasource.username=sa
spring.datasource.password=
# Explicit dialect required because SimpleDriverDataSource does not expose JDBC metadata
# for automatic dialect detection by Hibernate 7.x
spring.jpa.database-platform=org.hibernate.dialect.HSQLDialect
